<!DOCTYPE html>
<html>
<head>
<title>Setting App</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
*{box-sizing:border-box}
body{
font-family:'Segoe UI',Arial;
margin:0;
background:linear-gradient(135deg,#0f172a,#1e3a8a);
min-height:100vh;
}

.container{
max-width:460px;
margin:auto;
padding:10px;
}

.card{
background:white;
border-radius:16px;
padding:15px;
box-shadow:0 8px 20px rgba(0,0,0,0.2);
}

h2{
text-align:center;
color:#1e3a8a;
margin-bottom:10px;
}

input,select{
width:100%;
padding:12px;
border-radius:10px;
border:1px solid #cbd5f5;
margin-bottom:10px;
font-size:15px;
font-weight:700;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
font-weight:700;
margin-top:8px;
cursor:pointer;
}

.btn-primary{background:#1e3a8a;color:white;}
.btn-green{background:#10b981;color:white;}
.btn-gray{background:#64748b;color:white;}
.btn-red{background:#dc2626;color:white;}

.row{
border-bottom:1px solid #eee;
padding:10px 0;
}

.item-top{
display:flex;
gap:8px;
align-items:center;
}

.item-name{
flex:1;
font-weight:900;
color:#1e3a8a;
}

.item-actions{
display:grid;
grid-template-columns:1fr 1fr 44px;
gap:6px;
margin-top:8px;
}

.item-actions input,
.item-actions select{
margin-bottom:0;
padding:9px;
font-size:13px;
}

.item-actions button{
margin-top:0;
padding:9px;
}

.label-box{
background:#f1f5f9;
padding:10px;
border-radius:10px;
margin-bottom:10px;
}

.info{
font-size:12px;
color:#64748b;
font-weight:700;
line-height:1.4;
margin:4px 0 10px;
}

.badge{
display:inline-block;
background:#dbeafe;
color:#1e3a8a;
border-radius:999px;
padding:4px 8px;
font-size:11px;
font-weight:900;
margin-top:5px;
}

.add-grid{
display:grid;
grid-template-columns:1fr 110px;
gap:6px;
}

.add-grid-full{
display:grid;
grid-template-columns:1fr;
gap:6px;
}
</style>
</head>

<body>

<div class="container">
<div class="card">

<h2>⚙️ Setting App</h2>

<div class="label-box">
<b>Custom Label</b>
<input type="text" id="labelApp" placeholder="Contoh: Kantin / Kas / Inventaris">
<button class="btn-primary" onclick="saveLabel()">Simpan Label</button>
</div>

<div class="label-box">
<b>Warna Tampilan</b>
<label>Primary</label>
<input type="color" id="colorPrimary" value="#1e3a8a">
<label>Background</label>
<input type="color" id="colorBg" value="#0f172a">
<button class="btn-primary" onclick="saveTheme()">Simpan Warna</button>
</div>

<div class="label-box">
<b>Nomor WhatsApp (Format: 628xxx)</b>
<input type="text" id="wa1" placeholder="Nomor 1">
<input type="text" id="wa2" placeholder="Nomor 2">
<input type="text" id="wa3" placeholder="Nomor 3">
<input type="text" id="wa4" placeholder="Nomor 4">
<button class="btn-primary" onclick="saveWA()">Simpan Nomor WA</button>
</div>

<div class="label-box">
<b>Item + Harga + Kelompok</b>
<div class="info">
Item lama seperti Cilok/Tahu/Batagor tetap aman. Tambahan kelompok hanya menambah field <b>kategori</b>, tidak merusak data lama.
</div>

<div class="add-grid">
<input type="text" id="namaItem" placeholder="Nama item">
<input type="number" id="hargaItem" placeholder="Harga">
</div>
<select id="kategoriItem">
  <option value="Cilok & Jajanan">Cilok & Jajanan</option>
  <option value="Mie Ayam">Mie Ayam</option>
  <option value="Bakso & Terang Bulan">Bakso & Terang Bulan</option>
  <option value="Es, Snack & Jajanan 3000">Es, Snack & Jajanan 3000</option>
  <option value="WA Only">WA Only / Hanya WhatsApp</option>
</select>
<button onclick="tambahItem()" class="btn-primary">+ Tambah Item</button>

<div id="listItem"></div>

<button class="btn-green" onclick="undo()">↩️ Undo</button>
</div>

<button class="btn-gray" onclick="kembali()">⬅️ Kembali</button>

</div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
firebase.initializeApp({
databaseURL:"https://maqshof-d5772-default-rtdb.asia-southeast1.firebasedatabase.app"
});

const db = firebase.database();
let lastDeleted = null;

const KATEGORI_DEFAULT = "Cilok & Jajanan";
const kategoriList = [
  "Cilok & Jajanan",
  "Mie Ayam",
  "Bakso & Terang Bulan",
  "Es, Snack & Jajanan 3000",
  "WA Only"
];

function esc(v){
  return String(v ?? "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

function kategoriOptions(selected){
  let s = selected || KATEGORI_DEFAULT;
  return kategoriList.map(k=>`<option value="${esc(k)}" ${k===s ? "selected" : ""}>${esc(k)}</option>`).join("");
}

function loadItems(){
let list=document.getElementById("listItem");
list.innerHTML="Loading...";

db.ref("items").on("value",snap=>{
list.innerHTML="";

if(!snap.exists()){
list.innerHTML="Belum ada item";
return;
}

let arr = [];
snap.forEach(c=>{
  let key=c.key;
  let data=c.val();
  let nama = typeof data === "string" ? data : (data.nama || data.barang || data.name || "");
  let harga = typeof data === "object" ? Number(data.harga || 0) : 0;
  let kategori = typeof data === "object" ? (data.kategori || KATEGORI_DEFAULT) : KATEGORI_DEFAULT;
  let urutan = typeof data === "object" ? Number(data.urutan || 9999) : 9999;
  arr.push({key,nama,harga,kategori,urutan});
});

arr.sort((a,b)=> a.urutan - b.urutan || String(a.nama).localeCompare(String(b.nama)));

arr.forEach(item=>{
let div=document.createElement("div");
div.className="row";

div.innerHTML=`
<div class="item-top">
  <span class="item-name">${esc(item.nama)}</span>
  <span class="badge">${esc(item.kategori || KATEGORI_DEFAULT)}</span>
</div>
<div class="item-actions">
  <input type="number" value="${Number(item.harga || 0)}" onchange="updateHarga('${item.key}',this.value)" placeholder="Harga">
  <select onchange="updateKategori('${item.key}',this.value)">
    ${kategoriOptions(item.kategori)}
  </select>
  <button class="btn-red" onclick="hapusItem('${item.key}')">🗑️</button>
</div>
`;

list.appendChild(div);
});
});
}

function tambahItem(){
let nama=document.getElementById("namaItem").value.trim();
let harga=document.getElementById("hargaItem").value;
let kategori=document.getElementById("kategoriItem").value || KATEGORI_DEFAULT;

if(!nama || !harga){
alert("Isi nama & harga");
return;
}

// urutan baru otomatis di bawah item lain
let urutanBaru = Date.now();

db.ref("items").push({
nama:nama,
harga:Number(harga),
kategori:kategori,
urutan:urutanBaru
});

document.getElementById("namaItem").value="";
document.getElementById("hargaItem").value="";
document.getElementById("kategoriItem").value=KATEGORI_DEFAULT;
}

function updateHarga(key,harga){
db.ref("items/"+key+"/harga").set(Number(harga || 0));
}

function updateKategori(key,kategori){
db.ref("items/"+key+"/kategori").set(kategori || KATEGORI_DEFAULT);
}

function hapusItem(key){
if(!confirm("Yakin hapus item ini?")) return;
db.ref("items/"+key).once("value").then(snap=>{
lastDeleted={key:key,value:snap.val()};
db.ref("items/"+key).remove();
});
}

function undo(){
if(!lastDeleted){
alert("Tidak ada undo");
return;
}
db.ref("items/"+lastDeleted.key).set(lastDeleted.value);
lastDeleted=null;
}

function saveLabel(){
let val=document.getElementById("labelApp").value;
db.ref("config/label").set(val);
alert("Label disimpan");
}

function saveTheme(){
let primary=document.getElementById("colorPrimary").value;
let bg=document.getElementById("colorBg").value;

db.ref("config/theme").set({
primary:primary,
bg:bg
});

alert("Warna disimpan");
}

function saveWA(){
let data={
wa1:document.getElementById("wa1").value,
wa2:document.getElementById("wa2").value,
wa3:document.getElementById("wa3").value,
wa4:document.getElementById("wa4").value
};

db.ref("config/wa").set(data);
alert("Nomor WA disimpan");
}

function loadConfig(){
db.ref("config").once("value",snap=>{
let data=snap.val() || {};

if(data.label){
document.getElementById("labelApp").value=data.label;
}

if(data.theme){
document.getElementById("colorPrimary").value=data.theme.primary || "#1e3a8a";
document.getElementById("colorBg").value=data.theme.bg || "#0f172a";
}

if(data.wa){
document.getElementById("wa1").value=data.wa.wa1 || "";
document.getElementById("wa2").value=data.wa.wa2 || "";
document.getElementById("wa3").value=data.wa.wa3 || "";
document.getElementById("wa4").value=data.wa.wa4 || "";
}
});
}

function kembali(){
window.location.href="index.html";
}

window.onload=function(){
loadItems();
loadConfig();
}
</script>

</body>
</html>
