<!DOCTYPE html>
<html>
<head>
<title>Setting App</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta charset="UTF-8">

<style>
*{box-sizing:border-box}
body{
font-family:'Segoe UI',Arial;
margin:0;
background:linear-gradient(135deg,#0f172a,#1e3a8a);
min-height:100vh;
}
.container{max-width:460px;margin:auto;padding:10px;}
.card{background:white;border-radius:16px;padding:15px;box-shadow:0 8px 20px rgba(0,0,0,0.2);}
h2{text-align:center;color:#1e3a8a;margin-bottom:10px;}
input,select{width:100%;padding:12px;border-radius:10px;border:1px solid #cbd5f5;margin-bottom:10px;font-size:15px;font-weight:700;}
button{width:100%;padding:12px;border:none;border-radius:10px;font-weight:700;margin-top:8px;cursor:pointer;}
.btn-primary{background:#1e3a8a;color:white;}
.btn-green{background:#10b981;color:white;}
.btn-gray{background:#64748b;color:white;}
.btn-red{background:#dc2626;color:white;}
.label-box{background:#f1f5f9;padding:10px;border-radius:10px;margin-bottom:10px;}
.info{font-size:12px;color:#64748b;font-weight:700;line-height:1.45;margin:5px 0 10px;}
.row{background:white;border:1px solid #e2e8f0;border-radius:12px;padding:10px;margin-top:10px;}
.item-title{font-weight:900;color:#1e3a8a;margin-bottom:8px;}
.item-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.item-grid input,.item-grid select{margin-bottom:0;padding:9px;font-size:13px;}
.item-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px;}
.item-actions button{margin-top:0;padding:9px;font-size:13px;}
.add-grid{display:grid;grid-template-columns:1fr 110px;gap:6px;}
.badge{display:inline-block;background:#dbeafe;color:#1e3a8a;border-radius:999px;padding:4px 8px;font-size:11px;font-weight:900;margin-bottom:8px;}
.badge.gray{background:#e5e7eb;color:#334155;}
</style>
</head>
<body>
<div class="container">
<div class="card">

<h2>⚙️ Setting App</h2>

<div class="label-box">
<b>Custom Label</b>
<input type="text" id="labelApp" placeholder="Contoh: Kantin / Kas / Inventaris">
<button class="btn-primary" onclick="saveLabel()">Simpan Label</button>
</div>

<div class="label-box">
<b>Warna Tampilan</b>
<label>Primary</label>
<input type="color" id="colorPrimary" value="#1e3a8a">
<label>Background</label>
<input type="color" id="colorBg" value="#0f172a">
<button class="btn-primary" onclick="saveTheme()">Simpan Warna</button>
</div>


<div class="label-box">
<b>Item + Harga</b>
<div class="info">
Setting ini hanya untuk master item dan harga. Menu nomor WA sudah dihapus. Item khusus seperti Mie Ayam, Bakso, Terang Bulan, Es, Snack, dan Jajanan 3000 akan otomatis dipisah dari kelompok Cilok walaupun dulu pernah tersimpan salah.
</div>

<div class="add-grid">
<input type="text" id="namaItem" placeholder="Nama item">
<input type="number" id="hargaItem" placeholder="Harga">
</div>

<select id="kelompokItem">
  <option value="">Tanpa kelompok khusus / item lama</option>
  <option value="Mie Ayam">Mie Ayam</option>
  <option value="Bakso & Terang Bulan">Bakso & Terang Bulan</option>
  <option value="Es, Snack & Jajanan 3000">Es, Snack & Jajanan 3000</option>
  <option value="WA Only">WA Only / Hanya WhatsApp</option>
</select>
<button onclick="tambahItem()" class="btn-primary">+ Tambah Item</button>
<button onclick="perbaikiKelompokOtomatis()" class="btn-green">✅ Perbaiki Kelompok Otomatis</button>

<div id="listItem"></div>
<button class="btn-green" onclick="undo()">↩️ Undo</button>
</div>

<button class="btn-gray" onclick="kembali()">⬅️ Kembali</button>

</div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
firebase.initializeApp({
databaseURL:"https://maqshof-d5772-default-rtdb.asia-southeast1.firebasedatabase.app"
});

const db = firebase.database();
let lastDeleted = null;

const kelompokList = [
  "",
  "Mie Ayam",
  "Bakso & Terang Bulan",
  "Es, Snack & Jajanan 3000",
  "WA Only"
];

function esc(v){
  return String(v ?? "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

function getNama(data){
  if(typeof data === "string") return data;
  return data.nama || data.barang || data.name || "";
}

function getHarga(data){
  if(typeof data !== "object" || data === null) return 0;
  return Number(data.harga || 0);
}

function normalNama(v){
  return String(v || "").toLowerCase().trim();
}

function kelompokOtomatisDariNama(nama, kelompokTersimpan=""){
  let n = normalNama(nama);

  // Ini sengaja lebih kuat daripada kategori lama, agar Mie Ayam yang dulu salah masuk Cilok otomatis terbaca benar.
  if(n === "mie ayam") return "Mie Ayam";
  if(n === "bakso" || n === "terang bulan") return "Bakso & Terang Bulan";
  if(["es teh", "es jeruk", "es blewah", "es coklat", "jus alpukat", "es sari kedelai", "aneka snack", "jajanan 3000"].includes(n)){
    return "Es, Snack & Jajanan 3000";
  }

  let k = String(kelompokTersimpan || "").trim();
  if(k === "Cilok & Jajanan") return "";
  return k;
}

function getKelompok(data){
  let nama = getNama(data);
  if(typeof data !== "object" || data === null) return kelompokOtomatisDariNama(nama, "");
  return kelompokOtomatisDariNama(nama, data.kelompokLaporan || data.kategori || "");
}

function getUrutan(data){
  if(typeof data !== "object" || data === null) return 9999;
  return Number(data.urutan || data.order || 9999);
}

function kelompokOptions(selected){
  let s = selected || "";
  return kelompokList.map(k=>{
    let label = k || "Tanpa kelompok khusus / item lama";
    return `<option value="${esc(k)}" ${k===s ? "selected" : ""}>${esc(label)}</option>`;
  }).join("");
}

function labelKelompok(k){
  if(!k) return '<span class="badge gray">item lama / tanpa kelompok khusus</span>';
  return `<span class="badge">${esc(k)}</span>`;
}

function loadItems(){
let list=document.getElementById("listItem");
list.innerHTML="Loading...";

db.ref("items").on("value",snap=>{
list.innerHTML="";

if(!snap.exists()){
list.innerHTML="Belum ada item";
return;
}

let arr = [];
snap.forEach(c=>{
  let data = c.val();
  arr.push({
    key:c.key,
    nama:getNama(data),
    harga:getHarga(data),
    kelompok:getKelompok(data),
    urutan:getUrutan(data),
    raw:data
  });
});

arr.sort((a,b)=> a.urutan - b.urutan || String(a.nama).localeCompare(String(b.nama)));

arr.forEach(item=>{
let div=document.createElement("div");
div.className="row";

div.innerHTML=`
<div class="item-title">${esc(item.nama)}</div>
${labelKelompok(item.kelompok)}
<div class="item-grid">
  <input type="number" value="${Number(item.harga || 0)}" onchange="updateHarga('${item.key}',this.value)" placeholder="Harga">
  <select onchange="updateKelompok('${item.key}',this.value)">
    ${kelompokOptions(item.kelompok)}
  </select>
</div>
<div class="item-actions">
  <button class="btn-primary" onclick="simpanNamaHarga('${item.key}')">Simpan</button>
  <button class="btn-red" onclick="hapusItem('${item.key}')">🗑️ Hapus</button>
</div>
`;

// tombol Simpan hanya untuk penyelaras tampilan; harga/kelompok sudah auto-save onchange.
list.appendChild(div);
});
});
}

function tambahItem(){
let nama=document.getElementById("namaItem").value.trim();
let harga=document.getElementById("hargaItem").value;
let kelompok=document.getElementById("kelompokItem").value || "";
kelompok = kelompokOtomatisDariNama(nama, kelompok);

if(!nama || !harga){
alert("Isi nama & harga");
return;
}

let data = {
  nama:nama,
  harga:Number(harga),
  urutan:Date.now()
};

// Kelompok hanya disimpan kalau memang dipilih.
// Kalau kosong, formatnya tetap sederhana seperti item lama.
if(kelompok){
  data.kelompokLaporan = kelompok;
  data.kategori = kelompok; // untuk kompatibel dengan laporan yang sudah memakai kategori
}

db.ref("items").push(data);

document.getElementById("namaItem").value="";
document.getElementById("hargaItem").value="";
document.getElementById("kelompokItem").value="";
}

function updateHarga(key,harga){
db.ref("items/"+key+"/harga").set(Number(harga || 0));
}

function updateKelompok(key,kelompok){
let updates = {};
if(kelompok){
  updates["items/"+key+"/kelompokLaporan"] = kelompok;
  updates["items/"+key+"/kategori"] = kelompok;
}else{
  updates["items/"+key+"/kelompokLaporan"] = null;
  updates["items/"+key+"/kategori"] = null;
}
db.ref().update(updates);
}

function simpanNamaHarga(key){
alert("Harga/kelompok sudah tersimpan otomatis saat diubah.");
}

function hapusItem(key){
if(!confirm("Yakin hapus item ini?")) return;
db.ref("items/"+key).once("value").then(snap=>{
lastDeleted={key:key,value:snap.val()};
db.ref("items/"+key).remove();
});
}

function undo(){
if(!lastDeleted){
alert("Tidak ada undo");
return;
}
db.ref("items/"+lastDeleted.key).set(lastDeleted.value);
lastDeleted=null;
}

function saveLabel(){
let val=document.getElementById("labelApp").value;
db.ref("config/label").set(val);
alert("Label disimpan");
}

function saveTheme(){
let primary=document.getElementById("colorPrimary").value;
let bg=document.getElementById("colorBg").value;
db.ref("config/theme").set({primary:primary,bg:bg});
alert("Warna disimpan");
}


function loadConfig(){
db.ref("config").once("value",snap=>{
let data=snap.val() || {};
if(data.label) document.getElementById("labelApp").value=data.label;
if(data.theme){
  document.getElementById("colorPrimary").value=data.theme.primary || "#1e3a8a";
  document.getElementById("colorBg").value=data.theme.bg || "#0f172a";
}
});
}

function perbaikiKelompokOtomatis(){
  if(!confirm("Perbaiki otomatis kelompok Mie Ayam, Bakso, Terang Bulan, Es/Snack/Jajanan 3000? Item Cilok/Tahu/Batagor tidak akan diubah.")) return;

  db.ref("items").once("value", snap=>{
    let updates = {};
    snap.forEach(c=>{
      let data = c.val();
      let nama = getNama(data);
      let kelompok = kelompokOtomatisDariNama(nama, "");
      if(kelompok){
        updates["items/"+c.key+"/kelompokLaporan"] = kelompok;
        updates["items/"+c.key+"/kategori"] = kelompok;
      }
    });

    if(Object.keys(updates).length === 0){
      alert("Tidak ada item khusus yang perlu diperbaiki.");
      return;
    }

    db.ref().update(updates).then(()=>{
      alert("Kelompok otomatis berhasil diperbaiki. Mie Ayam tidak lagi masuk kelompok Cilok.");
    });
  });
}

function kembali(){ window.location.href="index.html"; }

window.onload=function(){
loadItems();
loadConfig();
}
</script>
</body>
</html>
