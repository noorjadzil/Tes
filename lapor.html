<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lapor WA</title>

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:'Segoe UI',Arial,sans-serif;
  background:linear-gradient(135deg,#0f172a,#1e3a8a);
  color:#0f172a;
}
.container{
  max-width:460px;
  margin:auto;
  padding:12px;
}
.card{
  background:#fff;
  border-radius:22px;
  padding:16px;
  box-shadow:0 12px 30px rgba(0,0,0,.25);
}
h2{
  text-align:center;
  color:#1e3a8a;
  margin:6px 0 16px;
}
label{
  display:block;
  font-size:13px;
  font-weight:800;
  margin:12px 0 6px;
}
input,select,textarea{
  width:100%;
  padding:12px;
  border:1px solid #cbd5e1;
  border-radius:14px;
  font-size:15px;
  font-weight:600;
}
textarea{
  resize:none;
  min-height:70px;
}
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
}
.row{
  display:grid;
  grid-template-columns:1fr 75px;
  gap:8px;
  align-items:center;
  background:#f8fafc;
  border:1px solid #e2e8f0;
  padding:10px;
  border-radius:16px;
  margin-top:8px;
}
.row b{
  font-size:14px;
}
.row input{
  text-align:center;
  padding:10px;
}
.catatan{
  grid-column:1/3;
}
.btn{
  width:100%;
  border:none;
  border-radius:16px;
  padding:14px;
  margin-top:12px;
  font-size:15px;
  font-weight:900;
  color:white;
  background:#1e3a8a;
}
.btn-green{background:#16a34a}
.btn-red{background:#dc2626}
.btn-gray{background:#475569}
.preview{
  white-space:pre-wrap;
  background:#020617;
  color:#e5e7eb;
  border-radius:16px;
  padding:14px;
  margin-top:14px;
  font-size:14px;
  line-height:1.6;
}
.item-setting{
  display:flex;
  gap:8px;
  margin-top:8px;
}
.item-setting input{
  flex:1;
}
.item-setting button{
  width:46px;
  border:none;
  border-radius:12px;
  background:#dc2626;
  color:white;
  font-weight:900;
}
.small{
  font-size:12px;
  color:#64748b;
  margin-top:5px;
}
</style>
</head>

<body>

<div class="container">
<div class="card">

<h2>Lapor WA Maqshof</h2>

<label>Tempat</label>
<select id="tempat">
  <option>Ikhwan</option>
  <option>Akhwat</option>
</select>

<div class="grid">
  <div>
    <label>Tanggal</label>
    <input type="date" id="tanggal">
  </div>
  <div>
    <label>Waktu</label>
    <select id="waktu">
      <option>Pagi</option>
      <option>Malam</option>
    </
