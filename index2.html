<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mini Studio</title>
<style>
*{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:#0f172a;color:#e5e7eb}
.top{display:flex;align-items:center;gap:10px;padding:12px 16px;background:#111827;border-bottom:1px solid #374151;position:sticky;top:0}
.brand{font-weight:700;font-size:18px;flex:1}
.btn,input{background:#1f2937;color:#fff;border:1px solid #374151;border-radius:10px;padding:9px 12px}
.btn{cursor:pointer}
.layout{display:grid;grid-template-columns:260px 1fr;min-height:calc(100vh - 58px)}
.sidebar{background:#111827;border-right:1px solid #374151;padding:14px}
.main{padding:14px}
.card{background:#111827;border:1px solid #374151;border-radius:14px;padding:10px}
.list{margin-top:10px;display:flex;flex-direction:column;gap:6px;max-height:300px;overflow:auto}
.item{padding:10px;border-radius:10px;background:#1f2937;cursor:pointer}
.item:hover,.item.active{background:#2563eb}
textarea{width:100%;height:45vh;background:#020617;color:#86efac;border:1px solid #374151;border-radius:12px;padding:12px;font-family:Consolas,monospace}
iframe{width:100%;height:42vh;border:1px solid #374151;border-radius:12px;background:#fff;margin-top:12px}
.link{width:100%;margin-top:8px}
@media(max-width:900px){.layout{grid-template-columns:1fr}.sidebar{border-right:none;border-bottom:1px solid #374151}}
</style>
</head>
<body>
<div class="top">
<div class="brand">Mini Studio</div>
<input id="projectName" placeholder="Nama project">
<button class="btn" onclick="saveProject()">💾 Save</button>
<button class="btn" onclick="preview()">▶ Preview</button>
<button class="btn" onclick="copyLink()">🔗 Copy</button>
<button class="btn" onclick="openSite()">🌐 Open</button>
</div>

<div class="layout">
<aside class="sidebar">
<div class="card">
<b>📁 Open</b>
<div id="projectList" class="list"></div>
</div>
</aside>

<main class="main">
<textarea id="code"><!DOCTYPE html>
<html>
<head><title>Halo</title></head>
<body>
<h1>Hello World</h1>
<p>Edit halaman ini lalu Save.</p>
</body>
</html></textarea>
<input id="shareLink" class="btn link" readonly placeholder="Link project">
<iframe id="previewFrame"></iframe>
</main>
</div>

<script>
const DB="https://bahasa-arab-90f36-default-rtdb.asia-southeast1.firebasedatabase.app";
const qs=new URLSearchParams(location.search);
const viewId=qs.get("id");
if(viewId){
 fetch(DB+"/projects/"+encodeURIComponent(viewId)+".json").then(r=>r.json()).then(d=>{
   if(!d){document.body.innerHTML="<h2>Project tidak ditemukan</h2>";return;}
   document.open();document.write(d.code);document.close();
 });
}else{
const code=code=document.getElementById("code");
const frame=document.getElementById("previewFrame");
const list=document.getElementById("projectList");
const pname=document.getElementById("projectName");
const link=document.getElementById("shareLink");

function url(n){return location.origin+location.pathname+"?id="+encodeURIComponent(n)}

window.preview=()=>{let d=frame.contentDocument;d.open();d.write(code.value);d.close();}
code.oninput=preview;preview();

async function loadList(){
 list.innerHTML="Memuat...";
 try{
 const r=await fetch(DB+"/projects.json"); const data=await r.json()||{};
 list.innerHTML="";
 Object.keys(data).sort().forEach(n=>{
   const div=document.createElement("div");
   div.className="item";
   div.textContent=n;
   div.onclick=()=>openProject(n,div);
   list.appendChild(div);
 });
 }catch(e){list.innerHTML="Gagal memuat";}
}
window.saveProject=async()=>{
 const n=pname.value.trim();
 if(!n){alert("Isi nama project");return;}
 const ok=await fetch(DB+"/projects/"+encodeURIComponent(n)+".json",{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify({code:code.value,updated:Date.now()})});
 if(ok.ok){link.value=url(n);await loadList();alert("Tersimpan");} else alert("Gagal menyimpan");
}
window.openProject=async(n,el)=>{
 const r=await fetch(DB+"/projects/"+encodeURIComponent(n)+".json");
 const d=await r.json();
 if(!d)return;
 document.querySelectorAll(".item").forEach(i=>i.classList.remove("active"));
 if(el)el.classList.add("active");
 pname.value=n;
 code.value=d.code;
 link.value=url(n);
 preview();
}
window.copyLink=()=>{if(!link.value)return alert("Simpan dulu");navigator.clipboard.writeText(link.value);alert("Link disalin")}
window.openSite=()=>{if(link.value)window.open(link.value)}
loadList();
}
</script>
</body>
</html>
