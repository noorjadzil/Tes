<!DOCTYPE html>
<html>
<head>
<title>Laporan Jajan</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1e3a8a">

<style>
body{
font-family:'Segoe UI',Arial;
margin:0;
background:linear-gradient(135deg,#0f172a,#1e3a8a);
}
.container{
max-width:420px;
margin:auto;
padding:10px;
}
.card{
background:white;
border-radius:16px;
padding:15px;
box-shadow:0 8px 20px rgba(0,0,0,0.2);
}
h2{
text-align:center;
color:#1e3a8a;
}
.tab-btn{
flex:1;
padding:10px;
border:none;
color:white;
cursor:pointer;
}
.active{ background:#1e3a8a; }
.nonactive{ background:#94a3b8; }

.laporan-card{
background:white;
margin-top:12px;
padding:12px;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.laporan-header{
font-size:18px;
font-weight:700;
color:#1e3a8a;
margin-bottom:6px;
}

.laporan-items{
margin-top:6px;
font-weight:600;
}

input[type="number"],input[type="datetime-local"]{
padding:6px;
border-radius:8px;
border:1px solid #ccc;
}

</style>
</head>

<body>

<div class="container">
<div class="card">

<h2>Laporan Jajan</h2>

<button onclick="location.href='index.html'" style="
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#64748b;
color:white;
font-weight:700;
margin-bottom:10px;">
⬅️ Kembali
</button>

<div id="listLaporan">Loading...</div>

</div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>

const firebaseConfig={
databaseURL:"https://maqshof-d5772-default-rtdb.asia-southeast1.firebasedatabase.app"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.database();

// ================= LOAD =================
function loadLaporan(){

let list=document.getElementById("listLaporan");
list.innerHTML="Loading...";

db.ref("jajan").limitToLast(50).once("value",snap=>{

list.innerHTML="";

if(!snap.val()){
list.innerHTML="Belum ada data";
return;
}

let arr=[];

snap.forEach(c=>{
arr.push({key:c.key,data:c.val()});
});

arr.reverse();

arr.forEach(obj=>{

let d=obj.data;
let key=obj.key;

// ITEM
let items=(d.items||[]).map((i,idx)=>`
<div style="display:flex;justify-content:space-between;margin:4px 0;">
<span>${i.barang}</span>
<input type="number" value="${i.jumlah}" 
onchange="updateJumlah('${key}',${idx},this.value)">
</div>
`).join("");

let div=document.createElement("div");
div.className="laporan-card";

div.innerHTML=`
<div class="laporan-header">${d.jenis} - ${d.tempat}</div>

<input type="datetime-local" 
value="${formatInputDate(d.waktu)}"
onchange="updateTanggal('${key}',this.value)"
style="width:100%;margin-bottom:6px;">

<div class="laporan-items">${items}</div>

${d.catatan ? `<div style="color:red">Catatan: ${d.catatan}</div>`:""}
`;

list.appendChild(div);

});

});
}

// ================= FORMAT =================
function formatInputDate(waktu){
let d=new Date(waktu);

return d.getFullYear()+"-"+
String(d.getMonth()+1).padStart(2,"0")+"-"+
String(d.getDate()).padStart(2,"0")+"T"+
String(d.getHours()).padStart(2,"0")+":"+
String(d.getMinutes()).padStart(2,"0");
}

// ================= UPDATE =================
function updateJumlah(key,index,value){

let jumlah=Number(value);

if(isNaN(jumlah)||jumlah<0){
alert("Jumlah tidak valid");
loadLaporan();
return;
}

db.ref("jajan/"+key+"/items/"+index+"/jumlah").set(jumlah);
}

function updateTanggal(key,value){

let d=new Date(value);

if(isNaN(d)){
alert("Tanggal salah");
loadLaporan();
return;
}

db.ref("jajan/"+key+"/waktu").set(d.toISOString());
}

// ================= INIT =================
loadLaporan();

</script>

</body>
</html>
