<!DOCTYPE html>
<html>
<head>
<title>Laporan Jajan</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1e3a8a">

<style>
:root{
  --navy:#1e3a8a;
  --navy-dark:#0f172a;
  --blue:#2563eb;
  --green:#16a34a;
  --red:#dc2626;
  --slate:#64748b;
  --line:#e2e8f0;
  --soft:#f8fafc;
  --soft-blue:#eff6ff;
  --text:#0f172a;
  --muted:#64748b;
  --radius:18px;
  --shadow:0 18px 45px rgba(15,23,42,.16);
}

*{box-sizing:border-box}

body{
  font-family:'Segoe UI',Arial,sans-serif;
  margin:0;
  min-height:100vh;
  color:var(--text);
  background:
    radial-gradient(circle at top left, rgba(37,99,235,.35), transparent 34%),
    linear-gradient(135deg,#08111f,#1e3a8a 58%,#0f766e);
}

.container{
  max-width:460px;
  margin:auto;
  padding:14px;
}

.card{
  background:rgba(255,255,255,.96);
  border:1px solid rgba(255,255,255,.55);
  border-radius:26px;
  padding:16px;
  box-shadow:var(--shadow);
  backdrop-filter:blur(14px);
}

h2{
  text-align:center;
  color:var(--navy);
  margin:4px 0 16px;
  font-size:24px;
  letter-spacing:.2px;
}

button,select,input,textarea{
  font-family:inherit;
}

button{
  transition:.18s ease;
}

button:active{
  transform:scale(.98);
}

/* TAB */
.tab-btn{
  flex:1;
  padding:11px 8px;
  border:none;
  color:white;
  cursor:pointer;
  font-weight:900;
  font-size:13px;
}

.tab-btn:first-child{border-radius:14px 0 0 14px}
.tab-btn:last-child{border-radius:0 14px 14px 0}

.active{
  background:linear-gradient(135deg,#1e3a8a,#2563eb);
  box-shadow:inset 0 -2px 0 rgba(255,255,255,.18);
}
.nonactive{ background:#94a3b8; }

.laporan-card{
  background:linear-gradient(180deg,#ffffff,#f8fafc);
  margin-top:14px;
  padding:14px;
  border:1px solid rgba(226,232,240,.95);
  border-radius:20px;
  box-shadow:0 10px 26px rgba(15,23,42,.08);
}

.laporan-header{
  font-size:18px;
  font-weight:900;
  color:var(--navy);
  margin-bottom:8px;
  letter-spacing:.1px;
}

.laporan-tanggal{
  display:inline-flex;
  align-items:center;
  background:#e0edff;
  color:var(--navy);
  padding:6px 11px;
  border-radius:999px;
  font-size:13px;
  font-weight:900;
  margin-bottom:8px;
}

.laporan-items{
  margin-top:8px;
  line-height:1.6;
  font-weight:700;
  color:#334155;
}

.delete-toolbar{
  background:#fff7f7;
  border:1px solid #fecaca;
  border-radius:18px;
  padding:12px;
  margin-bottom:12px;
  display:none;
}

.delete-toolbar.active{display:block;}

.delete-actions{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  margin-top:10px;
}

.delete-actions button,.delete-toggle-btn{
  border:none;
  border-radius:13px;
  padding:11px;
  font-weight:900;
  cursor:pointer;
}

.delete-toggle-btn{
  width:100%;
  background:linear-gradient(135deg,#991b1b,#dc2626);
  color:white;
  margin-bottom:12px;
  box-shadow:0 8px 18px rgba(153,27,27,.18);
}

.delete-check-wrap{
  display:none;
  margin-bottom:9px;
  background:#fee2e2;
  color:#991b1b;
  font-weight:900;
  padding:9px 10px;
  border-radius:13px;
}

.delete-check-wrap input{
  transform:scale(1.25);
  margin-right:8px;
}

.laporan-card.delete-selected{
  outline:3px solid #ef4444;
  background:#fff7f7;
}

.rekap-table-wrap,.khusus-table-wrap{
  overflow-x:auto;
  margin-top:12px;
  border:1px solid var(--line);
  border-radius:16px;
  background:white;
  box-shadow:inset 0 0 0 1px rgba(255,255,255,.5);
}

.rekap-table,.khusus-table{
  width:100%;
  border-collapse:separate;
  border-spacing:0;
  font-size:12px;
  background:white;
}

.rekap-table{min-width:760px;}
.khusus-table{min-width:720px;}

.rekap-table th,.khusus-table th{
  background:linear-gradient(135deg,#1e3a8a,#2563eb);
  color:white;
  padding:10px 7px;
  text-align:center;
  position:sticky;
  top:0;
  white-space:nowrap;
  font-weight:900;
}

.rekap-table th:first-child,.khusus-table th:first-child{border-top-left-radius:15px;}
.rekap-table th:last-child,.khusus-table th:last-child{border-top-right-radius:15px;}

.rekap-table td,.khusus-table td{
  border-bottom:1px solid #edf2f7;
  padding:9px 7px;
  text-align:center;
  font-weight:800;
  white-space:nowrap;
}

.rekap-table tbody tr:nth-child(even),
.khusus-table tbody tr:nth-child(even):not(.item-khusus-total):not(.khusus-grand-total){background:#f8fafc;}

.rekap-table td:first-child,
.rekap-table th:first-child{
  text-align:left;
  position:sticky;
  left:0;
  z-index:2;
}

.rekap-table td:first-child,
.khusus-table td:first-child,
.khusus-table td:nth-child(2){
  color:var(--navy);
  font-weight:900;
}

.rekap-table td:first-child{background:#f8fafc;}

.rekap-filter{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:9px;
  margin:12px 0;
}

.rekap-filter select{
  width:100%;
  padding:11px 12px;
  border:1px solid #cbd5e1;
  border-radius:14px;
  font-weight:900;
  color:var(--navy);
  background:white;
  outline:none;
}

.rekap-summary,.khusus-summary{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:9px;
  margin-top:12px;
}

.rekap-summary div,.khusus-summary div{
  background:linear-gradient(180deg,#eff6ff,#ffffff);
  border:1px solid #bfdbfe;
  border-radius:16px;
  padding:11px;
  font-size:12px;
  font-weight:900;
  color:var(--navy);
  box-shadow:0 6px 16px rgba(30,58,138,.07);
}

.share-bulanan-btn,.khusus-share-btn{
  border:none;
  border-radius:14px;
  background:linear-gradient(135deg,#16a34a,#22c55e);
  color:white;
  font-weight:900;
  cursor:pointer;
  box-shadow:0 10px 20px rgba(22,163,74,.20);
}

.share-bulanan-btn{
  width:100%;
  margin-top:12px;
  padding:13px;
}

.share-bulanan-btn:disabled,.khusus-share-btn:disabled{
  background:#94a3b8;
  cursor:not-allowed;
  box-shadow:none;
}

.share-note,.detail-note{
  font-size:12px;
  color:var(--muted);
  font-weight:700;
  line-height:1.45;
}

.share-note{margin-top:8px;}
.detail-note{margin:6px 0 9px;}

.detail-khusus-title{
  margin-top:18px;
  font-weight:900;
  color:var(--navy);
  font-size:17px;
  padding-left:9px;
  border-left:5px solid #2563eb;
}

.khusus-group-card{
  background:linear-gradient(180deg,#ffffff,#f8fbff);
  border:1px solid #dbeafe;
  border-radius:22px;
  padding:14px;
  margin-top:15px;
  box-shadow:0 12px 28px rgba(30,58,138,0.10);
}

.khusus-group-head{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:10px;
  margin-bottom:10px;
}

.khusus-group-title{
  font-size:17px;
  font-weight:950;
  color:var(--navy);
  line-height:1.25;
}

.khusus-share-btn{
  width:auto;
  min-width:104px;
  margin:0;
  padding:10px 12px;
  font-size:12px;
  white-space:nowrap;
}

.item-khusus-total{
  background:#ecfeff!important;
  font-weight:950;
}
.khusus-grand-total{
  background:#dbeafe!important;
  font-weight:950;
}

img{
  width:100%;
  border-radius:15px;
  margin-top:10px;
  border:1px solid #e2e8f0;
}

@media (max-width:380px){
  .container{padding:10px;}
  .card{padding:13px;border-radius:22px;}
  .khusus-group-head{flex-direction:column;}
  .khusus-share-btn{width:100%;}
  .rekap-summary,.khusus-summary{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<div class="container">
<div class="card">

<h2>Laporan Jajan</h2>

<button onclick="kembali()" style="
width:100%;
padding:12px;
border:none;
border-radius:14px;
background:linear-gradient(135deg,#64748b,#334155);
color:white;

margin-bottom:12px;
box-shadow:0 8px 18px rgba(15,23,42,.14);
">
⬅️ Kembali ke Input
</button>

<div style="display:flex;margin-bottom:10px;">
  <button id="btnLaporan" class="tab-btn active" onclick="showTab('laporan')">Laporan</button>

<div id="tabRekap" style="display:none;">

  <div id="rekapBulanan">Loading...</div>

</div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js">
function resolveVendorFromKategori(src){
 const v=(src&&typeof src==='object')?(src.kelompokLaporan||src.kategori||''):src;
 const kategori=String(v||'').trim();
 if(!kategori) return '';
 return kategori;
}

//=== Stage2 Master Map Helpers ===
function normalizeItemName(n){return String(n||'').trim().toLowerCase().replace(/\s+/g,' ');}
function buildMasterMap(list){
 const m={};
 (list||[]).forEach(it=>{m[normalizeItemName(it.nama)]=it;});
 return m;
}
window.__masterMap=buildMasterMap(window.masterItemsEdit||[]);
function getMasterItemByName(n){return window.__masterMap[normalizeItemName(n)]||null;}
//=== End Stage2 ===


// STAGE7 HARDENING
function __normalizeName(v){return String(v||'').trim().toLowerCase().replace(/\s+/g,' ');}
function __masterLookup(name){
 const key=__normalizeName(name);
 if(Array.isArray(masterItemsEdit)){
   const m=masterItemsEdit.find(x=>__normalizeName(x.nama)===key);
   if(m) return m;
 }
 return null;
}


// Stage8 helper
function getMasterByNameSafe(name){
  const key=(name||'').toString().trim().toLowerCase();
  if(Array.isArray(masterItemsEdit)){
    return masterItemsEdit.find(it=>((it.nama||'').toString().trim().toLowerCase()===key))||null;
  }
  return null;
}
</script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
// =================== NAV ===================
function kembali(){
  window.location.href = "index.html";
}

// =================== TAB ===================
function showTab(tab){
  const laporan = document.getElementById("tabLaporan");
  const rekap = document.getElementById("tabRekap");
  const bulanan = document.getElementById("tabBulanan");

  const btnLaporan = document.getElementById("btnLaporan");
  const btnRekap = document.getElementById("btnRekap");
  const btnBulanan = document.getElementById("btnBulanan");
  const btnModeHapus = document.getElementById("btnModeHapus");
  const deleteToolbar = document.getElementById("deleteToolbar");

  if(modeHapusAktif && tab !== "laporan") toggleModeHapus();

  laporan.style.display = tab === "laporan" ? "block" : "none";
  rekap.style.display = tab === "rekap" ? "block" : "none";
  bulanan.style.display = tab === "bulanan" ? "block" : "none";

  btnLaporan.className = tab === "laporan" ? "tab-btn active" : "tab-btn nonactive";
  btnRekap.className = tab === "rekap" ? "tab-btn active" : "tab-btn nonactive";
  btnBulanan.className = tab === "bulanan" ? "tab-btn active" : "tab-btn nonactive";

  if(btnModeHapus) btnModeHapus.style.display = tab === "laporan" ? "block" : "none";
  if(deleteToolbar && tab !== "laporan") deleteToolbar.classList.remove("active");
}

// =================== FIREBASE ===================
const firebaseConfig={
databaseURL:"https://maqshof-d5772-default-rtdb.asia-southeast1.firebasedatabase.app"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.database();

let modeHapusAktif = false;
let selectedHapus = new Set();

// =================== FORMAT ===================
function formatTanggal(waktu){
let date = new Date(waktu);

let hari = date.toLocaleDateString("id-ID",{weekday:"long"});
let tanggal = date.toLocaleDateString("id-ID",{day:"numeric", month:"long", year:"numeric"});
let jam = date.toLocaleTimeString("id-ID",{hour:"2-digit",minute:"2-digit"});

return `${hari}, ${tanggal} - ${jam}`;
}

function formatTanggalHari(waktu){
let date = new Date(waktu);

let hari = date.toLocaleDateString("id-ID",{weekday:"long"});
let tanggal = date.toLocaleDateString("id-ID",{day:"numeric", month:"long", year:"numeric"});

return `${hari}, ${tanggal}`;
}

// =================== LAPORAN ===================
function loadLaporan(){

let list=document.getElementById("listLaporan");
list.innerHTML="Loading...";

db.ref("jajan").limitToLast(50).once("value",snap=>{

list.innerHTML="";

if(!snap.val()){
list.innerHTML="Belum ada data";
return;
}

// ambil data + key
let arr=[];

snap.forEach(c=>{
  let d = c.val();
  d.key = c.key;
  arr.push(d);
});

arr.reverse();

arr.forEach(d=>{

const vendorMap={
'Vendor Cilok':['cilok','maklor','cimol','tahu batagor','dimsum','piscok'],
'Vendor Es':['es teh','es jeruk','es blewah','es coklat','jus alpukat','es sari kedelai'],
'Vendor Terang Bulan':['terang bulan'],
'Vendor Mie Ayam':['mie ayam'],
'Vendor Bakso':['bakso'],
'Vendor Es':['aneka snack','jajanan 3000']
};
let grup={};
(d.items||[]).forEach(i=>{
 let nama=String(i.barang||'').toLowerCase();
 let kategori=String(i.kategori||'').toLowerCase();
 let vendor='Vendor Cilok';

 const isEsName=nama.includes('es ')||nama.startsWith('jus ')||nama.includes('jeruk')||nama.includes('blewah')||nama.includes('coklat')||nama.includes('kedelai');
 if(kategori.includes('es') && isEsName){
   vendor='Vendor Es';
 }else if(kategori.includes('mie ayam')){
   vendor='Vendor Mie Ayam';
 }else if(kategori.includes('bakso')){
   vendor='Vendor Bakso';
 }else if(kategori.includes('terang bulan')){
   vendor='Vendor Terang Bulan';
 }else if(kategori.includes('es') || kategori.includes('jajanan 3000')){
   vendor='Vendor Es';
 }else{
   for(const [v,list] of Object.entries(vendorMap)){
     if(list.some(x=>nama.includes(x))){vendor=v;break;}
   }
 }
 let baris=(i.masuk!==undefined||i.retur!==undefined)?
 `• ${i.barang} - Masuk: ${Number(i.masuk||0)}, Retur: ${Number(i.retur||0)}`:
 `• ${i.barang} (${Number(i.jumlah||0)})`;
 (grup[vendor]??=[]).push(baris);
});
let items=Object.entries(grup).map(([v,arr])=>
`<div style="margin:10px 0">
<div style="background:#1e3a8a;color:#fff;padding:6px 10px;border-radius:8px;font-weight:900">${v}</div>
<div style="padding:8px 10px">${arr.join('<br>')}</div>
</div>`).join('');

let div=document.createElement("div");
div.className="laporan-card";

div.innerHTML=`
<label class="delete-check-wrap" id="checkWrap-${d.key}">
  <input type="checkbox" class="hapus-check" data-key="${d.key}" onchange="togglePilihHapus('${d.key}', this.checked)">
  Pilih untuk dihapus
</label>
<div class="laporan-header">
${d.jenis} - ${d.tempat}

${d.riwayatEdit ? '<span style="color:red;font-size:12px"> (edited)</span>' : ''}

<span onclick="toggleEdit('${d.key}')" style="cursor:pointer;float:right">✏️</span>
</div>

<div class="laporan-tanggal" id="tgl-${d.key}">
${formatTanggal(d.waktu)}
</div>

<div class="laporan-items" id="items-${d.key}">
${items}
</div>

<div id="edit-${d.key}" style="display:none;margin-top:10px"></div>

${d.catatan ? `
<div style="margin-top:8px;font-weight:700;color:#dc2626">
Catatan: ${d.catatan}
</div>
` : ""}

${d.foto ? `<img src="${d.foto}">` : ""}
`;

list.appendChild(div);
if(modeHapusAktif){
  let wrap = document.getElementById("checkWrap-"+d.key);
  let cb = div.querySelector('.hapus-check');
  if(wrap) wrap.style.display = "block";
  if(cb) cb.checked = selectedHapus.has(d.key);
  if(selectedHapus.has(d.key)) div.classList.add("delete-selected");
}

});

});
}


// =================== HITUNG REKAP FLEKSIBEL ===================
function angka(v){
  return Number(v || 0);
}

function tambahKeGrup(grup, d, hargaMap){
  if(!d.waktu) return;

  let dateObj = new Date(d.waktu);
  if(isNaN(dateObj)) return;

  let key = dateObj.toLocaleDateString("id-ID", {year:"numeric", month:"2-digit", day:"2-digit"});
  let label = formatTanggalHari(dateObj);

  if(!grup[key]){
    grup[key]={label, tanggalObj:dateObj, masukIkhwan:0, masukAkhwat:0, sisaIkhwan:0, sisaAkhwat:0, totalUang:0};
  }

  let jenis = (d.jenis || "").toLowerCase();
  let tempat = (d.tempat || "").toLowerCase();

  (d.items || []).forEach(i=>{
    // Item khusus punya rincian bulanan sendiri, supaya tidak tercampur dengan rekap Cilok/Tahu/Batagor lama.
    if(isItemKhusus(i)) return;

    let nama = (i.barang || "").toLowerCase().trim();
    let harga = hargaMap[nama] || 0;

    // Format baru: dalam 1 item ada masuk dan retur/sisa
    if(i.masuk !== undefined || i.retur !== undefined){
      let masuk = angka(i.masuk);
      let retur = angka(i.retur);

      if(tempat.includes("ikhwan")){
        grup[key].masukIkhwan += masuk;
        grup[key].sisaIkhwan += retur;
      }else if(tempat.includes("akhwat") || tempat.includes("akhawat")){
        grup[key].masukAkhwat += masuk;
        grup[key].sisaAkhwat += retur;
      }else{
        grup[key].masukAkhwat += masuk;
        grup[key].sisaAkhwat += retur;
      }

      grup[key].totalUang += Math.max(masuk - retur, 0) * harga;
      return;
    }

    // Format lama: jenis transaksi Masuk / Sisa, item hanya jumlah
    let jumlah = angka(i.jumlah);

    if(jenis.includes("masuk") && tempat.includes("ikhwan")){
      grup[key].masukIkhwan += jumlah;
      grup[key].totalUang += jumlah * harga;
    }
    if(jenis.includes("masuk") && (tempat.includes("akhwat") || tempat.includes("akhawat"))){
      grup[key].masukAkhwat += jumlah;
      grup[key].totalUang += jumlah * harga;
    }
    if((jenis.includes("sisa") || jenis.includes("retur")) && tempat.includes("ikhwan")){
      grup[key].sisaIkhwan += jumlah;
    }
    if((jenis.includes("sisa") || jenis.includes("retur")) && (tempat.includes("akhwat") || tempat.includes("akhawat"))){
      grup[key].sisaAkhwat += jumlah;
    }
  });
}

function hitungTerjual(g){
  return Math.max((g.masukIkhwan + g.masukAkhwat) - (g.sisaIkhwan + g.sisaAkhwat), 0);
}


// =================== ITEM KHUSUS BULANAN ===================
// Bagian ini hanya untuk item khusus seperti Es Teh, Terang Bulan, Mie Ayam, Bakso, Aneka Snack, Jajanan 3000.
// Cilok/Tahu/Batagor dan item lama tetap dihitung seperti sebelumnya.
const NAMA_ITEM_KHUSUS = [
  "mie ayam",
  "bakso",
  "terang bulan",
  "es teh",
  "es jeruk",
  "es blewah",
  "es coklat",
  "jus alpukat",
  "es sari kedelai",
  "aneka snack",
  "jajanan 3000"
];

const KATEGORI_ITEM_KHUSUS = [
  "mie ayam",
  "bakso & terang bulan",
  "bakso terang bulan",
  "es & snack",
  "es snack",
  "es, snack & jajanan 3000",
  "es snack jajanan 3000"
];

function normalText(v){
  return String(v || "").toLowerCase().trim();
}

function isItemKhusus(i){
  let nama = normalText(i.barang);
  let kategori = normalText(i.kategori);

  if(kategori && KATEGORI_ITEM_KHUSUS.some(k => kategori.includes(k))) return true;
  return NAMA_ITEM_KHUSUS.some(n => nama === n || nama.includes(n));
}

function ambilHargaItem(i, hargaMap){
  let nama = normalText(i.barang);
  return Number(i.harga || hargaMap[nama] || 0);
}

function kategoriLaporanKhusus(i){
  let nama = normalText(i.barang);
  let kategori = normalText(i.kategori);

  if(kategori.includes("mie ayam") || nama.includes("mie ayam")) return "Mie Ayam";
  if(kategori.includes("bakso") || kategori.includes("terang bulan") || nama.includes("bakso") || nama.includes("terang bulan")) return "Bakso & Terang Bulan";
  if(kategori.includes("es") || kategori.includes("es") || kategori.includes("jajanan 3000") || nama.startsWith("es ") || nama.includes("jus ") || nama.includes("aneka snack") || nama.includes("jajanan 3000")) return "Es, Snack & Jajanan 3000";

  return "Item Khusus Lain";
}

function susunDataRekapKhusus(dataBulan, hargaMap){
  let laporan = {};

  dataBulan.forEach(d=>{
    if(!d.waktu) return;
    let dateObj = new Date(d.waktu);
    if(isNaN(dateObj)) return;

    let tanggalKey = dateObj.toLocaleDateString("id-ID", {year:"numeric", month:"2-digit", day:"2-digit"});
    let tanggalLabel = formatTanggalHari(dateObj);
    let jenis = normalText(d.jenis);

    (d.items || []).forEach(i=>{
      if(!isItemKhusus(i)) return;

      let nama = String(i.barang || "").trim();
      if(!nama) return;

      let grupNama = kategoriLaporanKhusus(i);
      if(!laporan[grupNama]) laporan[grupNama] = {baris:{}, totalPerItem:{}, total:{masuk:0,sisa:0,terjual:0,totalUang:0}};

      let masuk = 0;
      let sisa = 0;

      if(i.masuk !== undefined || i.retur !== undefined){
        masuk = angka(i.masuk);
        sisa = angka(i.retur);
      }else{
        let jumlah = angka(i.jumlah);
        if(jenis.includes("masuk")) masuk = jumlah;
        if(jenis.includes("sisa") || jenis.includes("retur")) sisa = jumlah;
      }

      let harga = ambilHargaItem(i, hargaMap);
      let key = tanggalKey + "||" + nama;
      let g = laporan[grupNama];

      if(!g.baris[key]){
        g.baris[key] = {tanggalKey, tanggalLabel, tanggalObj:dateObj, nama, masuk:0, sisa:0, harga:harga};
      }

      g.baris[key].masuk += masuk;
      g.baris[key].sisa += sisa;
      if(harga) g.baris[key].harga = harga;

      if(!g.totalPerItem[nama]) g.totalPerItem[nama] = {nama, masuk:0, sisa:0, harga:harga};
      g.totalPerItem[nama].masuk += masuk;
      g.totalPerItem[nama].sisa += sisa;
      if(harga) g.totalPerItem[nama].harga = harga;
    });
  });

  Object.keys(laporan).forEach(grupNama=>{
    let g = laporan[grupNama];
    Object.values(g.baris).forEach(x=>{
      let terjual = Math.max(x.masuk - x.sisa, 0);
      let total = terjual * Number(x.harga || 0);
      g.total.masuk += x.masuk;
      g.total.sisa += x.sisa;
      g.total.terjual += terjual;
      g.total.totalUang += total;
    });
  });

  return laporan;
}

function safeIdKelompok(nama){
  return String(nama || "")
    .toLowerCase()
    .replace(/[^a-z0-9]+/g,"-")
    .replace(/(^-|-$)/g,"");
}

function buatHTMLRekapBulananKhusus(dataBulan, hargaMap){
  let laporan = susunDataRekapKhusus(dataBulan, hargaMap);
  let urutanGrup = ["Mie Ayam", "Bakso & Terang Bulan", "Es, Snack & Jajanan 3000", "Item Khusus Lain"];
  let adaIsi = urutanGrup.some(nama => laporan[nama] && Object.keys(laporan[nama].baris).length);

  window.__rekapKhususLast = laporan;

  if(!adaIsi){
    return `
      <div class="detail-khusus-title">Laporan Produk Terpisah</div>
      <div class="detail-note">Belum ada data produk terpisah pada bulan ini.</div>`;
  }

  let html = `
    <div class="detail-khusus-title">Laporan Produk Terpisah Per Pemilik</div>
    <div class="detail-note">
      Tiap kelompok dipisah karena pemilik produknya berbeda. Hitungan: Masuk - Sisa = Terjual, lalu Terjual × Harga = Total. Cilok/Tahu/Batagor tetap memakai rekap lama.
    </div>`;

  urutanGrup.forEach(grupNama=>{
    let g = laporan[grupNama];
    if(!g || !Object.keys(g.baris).length) return;

    let keys = Object.keys(g.baris).sort((a,b)=>{
      let A = g.baris[a], B = g.baris[b];
      return A.tanggalObj - B.tanggalObj || A.nama.localeCompare(B.nama);
    });

    let rows = keys.map(key=>{
      let x = g.baris[key];
      let terjual = Math.max(x.masuk - x.sisa, 0);
      let total = terjual * Number(x.harga || 0);
      return `
        <tr>
          <td>${x.tanggalLabel}</td>
          <td>${escText(x.nama)}</td>
          <td>${x.masuk}</td>
          <td>${x.sisa}</td>
          <td>${terjual}</td>
          <td>Rp ${Number(x.harga||0).toLocaleString("id-ID")}</td>
          <td>Rp ${total.toLocaleString("id-ID")}</td>
        </tr>`;
    }).join("");

    let totalRows = Object.values(g.totalPerItem).sort((a,b)=>a.nama.localeCompare(b.nama)).map(x=>{
      let terjual = Math.max(x.masuk - x.sisa, 0);
      let total = terjual * Number(x.harga || 0);
      return `
        <tr class="item-khusus-total">

          <td>Rp ${total.toLocaleString("id-ID")}</td>
        </tr>`;

    // Ringkasan kelompok dibuat per item, karena harga tiap item bisa berbeda.

    let ringkasanItem = Object.values(g.totalPerItem).sort((a,b)=>a.nama.localeCompare(b.nama)).map(x=>{
      let terjual = Math.max(x.masuk - x.sisa, 0);
      let total = terjual * Number(x.harga || 0);
      return `
        <div>
          ${escText(x.nama)}<br>
          <span style="font-size:17px">${terjual} pcs</span><br>
          <small>Rp ${total.toLocaleString("id-ID")}</small>
        </div>`;
    }).join("");

    html += `
      <div class="khusus-group-card" id="kelompok-${safeIdKelompok(grupNama)}">
        <div class="khusus-group-head">
          <div>
            <div class="khusus-group-title">${grupNama}</div>
            <div class="detail-note">Laporan khusus kelompok ini saja, tidak digabung dengan kelompok lain.</div>
          </div>

        </div>

        <div class="khusus-summary">
          ${ringkasanItem}
          <div>Total Kelompok<br><span style="font-size:17px">Rp ${g.total.totalUang.toLocaleString("id-ID")}</span></div>
        </div>

        <div class="khusus-table-wrap">
          <table class="khusus-table">
            <thead>
              <tr>
                <th>Tanggal</th>
                <th>Item</th>
                <th>Masuk</th>
                <th>Sisa</th>
                <th>Terjual</th>

            </thead>
            <tbody>
              ${rows}

              <tr class="khusus-grand-total">
                <td colspan="2">TOTAL KELOMPOK ${grupNama}</td>
                <td>${g.total.masuk}</td>
                <td>${g.total.sisa}</td>
                <td>-</td>
                <td>-</td>
                <td>Rp ${g.total.totalUang.toLocaleString("id-ID")}</td>
              </tr>

          </table>
        </div>
      </div>`;
  });

  return html;
}

function ambilHargaDanJajan(callback){
  db.ref("items").once("value",snapItem=>{
    let hargaMap = {};
    if(snapItem.exists()){
      snapItem.forEach(c=>{
        let d = c.val() || {};
        let nama = (d.nama || d.barang || d.name || "").toLowerCase().trim();
        hargaMap[nama] = Number(d.harga || 0);
      });
    }

    db.ref("jajan").once("value",snap=>{
      callback(hargaMap, snap);
    });
  });
}

function loadRekapBulanan(){
  let container = document.getElementById("rekapBulanan");
  if(!container) return;
  container.innerHTML = "Loading...";

  ambilHargaDanJajan((hargaMap, snap)=>{
    if(!snap.exists()){
      container.innerHTML = "Belum ada data";
      return;
    }

    let semuaData = Object.values(snap.val()).filter(d => d && d.waktu && !isNaN(new Date(d.waktu)));

    if(!semuaData.length){
      container.innerHTML = "Belum ada data";
      return;
    }

    let now = new Date();
    let bulanAktif = String(now.getMonth()+1).padStart(2,"0");
    let tahunAktif = String(now.getFullYear());

    // Kalau bulan sekarang belum ada data, otomatis pilih bulan data terbaru
    let sortedData = [...semuaData].sort((a,b)=> new Date(b.waktu) - new Date(a.waktu));
    let adaBulanIni = semuaData.some(d=>{
      let x = new Date(d.waktu);
      return String(x.getMonth()+1).padStart(2,"0") === bulanAktif && String(x.getFullYear()) === tahunAktif;
    });
    if(!adaBulanIni){
      let latest = new Date(sortedData[0].waktu);
      bulanAktif = String(latest.getMonth()+1).padStart(2,"0");
      tahunAktif = String(latest.getFullYear());
    }

    renderRekapBulanan(semuaData, hargaMap, bulanAktif, tahunAktif);
  });
}

      <div class="rekap-filter">
        <select id="bulanRekap" onchange="renderRekapBulananCache()">
          ${namaBulan.map((b,i)=>`<option value="${String(i+1).padStart(2,"0")}" ${String(i+1).padStart(2,"0")===bulanAktif ? "selected" : ""}>${b}</option>`).join("")}
        </select>
        <select id="tahunRekap" onchange="renderRekapBulananCache()">
          ${tahunList.map(t=>`<option value="${t}" ${t===tahunAktif ? "selected" : ""}>${t}</option>`).join("")}

  renderRekapBulanan(cache.semuaData, cache.hargaMap, bulan, tahun);
}

    .replace(/(^-|-$)/g,"") + ".png";
}

function canvasRoundRect(ctx, x, y, w, h, r){
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y);
  ctx.quadraticCurveTo(x+w, y, x+w, y+r);
  ctx.lineTo(x+w, y+h-r);
  ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  ctx.lineTo(x+r, y+h);
  ctx.quadraticCurveTo(x, y+h, x, y+h-r);
  ctx.lineTo(x, y+r);
  ctx.quadraticCurveTo(x, y, x+r, y);
  ctx.closePath();
}

function wrapTextCanvas(ctx, text, x, y, maxWidth, lineHeight){
  let words = String(text || "").split(" ");
  let line = "";
  let lines = [];

  words.forEach(word=>{
    let test = line ? line + " " + word : word;
    if(ctx.measureText(test).width > maxWidth && line){
      lines.push(line);
      line = word;
    }else{
      line = test;
    }
  });

  if(line) lines.push(line);
  lines.forEach((ln, i)=>ctx.fillText(ln, x, y + (i * lineHeight)));
  return lines.length;
}

function gambarRekapBulananBlob(){
  return new Promise((resolve, reject)=>{
    let data = window.__rekapBulananLast;
    if(!data){
      reject(new Error("Data bulanan belum siap."));
      return;
    }

    let keys = Object.keys(data.grup || {}).sort((a,b)=> data.grup[a].tanggalObj - data.grup[b].tanggalObj);
    let rowCount = Math.max(keys.length, 1);
    let width = 1200;
    let headerH = 145;
    let rowH = 52;
    let totalH = 62;
    let summaryH = 105;
    let footerH = 45;
    let height = headerH + rowH + (rowCount * rowH) + totalH + summaryH + footerH;

    let canvas = document.createElement("canvas");
    canvas.width = width;
    canvas.height = height;
    let ctx = canvas.getContext("2d");

    // background
    ctx.fillStyle = "#f8fafc";
    ctx.fillRect(0,0,width,height);

    // top header
    ctx.fillStyle = "#1e3a8a";
    ctx.fillRect(0,0,width,120);
    ctx.fillStyle = "white";
    ctx.font = "bold 42px Segoe UI, Arial";
    ctx.fillText(data.judul, 40, 55);
    ctx.font = "bold 24px Segoe UI, Arial";
    ctx.fillText("Laporan Jajan", 40, 92);

    // date generated
    ctx.textAlign = "right";
    ctx.font = "20px Segoe UI, Arial";
    ctx.fillText("Dibuat: " + new Date().toLocaleString("id-ID"), width - 40, 70);
    ctx.textAlign = "left";

    // table card
    let tableX = 30;
    let tableY = 145;
    let tableW = width - 60;
    let cols = [260, 140, 145, 140, 145, 120, 190];
    let headers = ["Tanggal", "Masuk Ikhwan", "Masuk Akhwat", "Sisa Ikhwan", "Sisa Akhwat", "Terjual", "Total Uang"];

    ctx.fillStyle = "white";
    canvasRoundRect(ctx, tableX, tableY, tableW, rowH + rowCount*rowH + totalH, 18);
    ctx.fill();

    // table header
    ctx.fillStyle = "#1e3a8a";
    canvasRoundRect(ctx, tableX, tableY, tableW, rowH, 18);
    ctx.fill();
    ctx.fillRect(tableX, tableY + 25, tableW, rowH - 25);

    let x = tableX;
    ctx.font = "bold 18px Segoe UI, Arial";
    ctx.fillStyle = "white";
    headers.forEach((h, idx)=>{
      ctx.textAlign = idx === 0 ? "left" : "center";
      let tx = idx === 0 ? x + 16 : x + cols[idx]/2;
      ctx.fillText(h, tx, tableY + 34);
      x += cols[idx];
    });

    // rows
    let y = tableY + rowH;
    ctx.font = "bold 18px Segoe UI, Arial";
    ctx.textBaseline = "middle";

    if(!keys.length){
      ctx.fillStyle = "#64748b";
      ctx.textAlign = "center";
      ctx.fillText("Tidak ada data pada bulan ini", width/2, y + rowH/2);
      y += rowH;
    }else{
      keys.forEach((key, rowIdx)=>{
        let g = data.grup[key];
        let terjual = hitungTerjual(g);
        let vals = [g.label, g.masukIkhwan, g.masukAkhwat, g.sisaIkhwan, g.sisaAkhwat, terjual, "Rp " + g.totalUang.toLocaleString("id-ID")];

        ctx.fillStyle = rowIdx % 2 === 0 ? "#ffffff" : "#f1f5f9";
        ctx.fillRect(tableX, y, tableW, rowH);

        let cx = tableX;
        vals.forEach((v, idx)=>{
          ctx.fillStyle = idx === 0 ? "#1e3a8a" : "#0f172a";
          ctx.textAlign = idx === 0 ? "left" : "center";
          let tx = idx === 0 ? cx + 16 : cx + cols[idx]/2;
          ctx.fillText(String(v), tx, y + rowH/2);
          cx += cols[idx];
        });

        ctx.strokeStyle = "#e2e8f0";
        ctx.beginPath();
        ctx.moveTo(tableX, y + rowH);
        ctx.lineTo(tableX + tableW, y + rowH);
        ctx.stroke();
        y += rowH;
      });
    }

    // total row
    let t = data.total || {};
    let totalVals = ["TOTAL", t.masukIkhwan||0, t.masukAkhwat||0, t.sisaIkhwan||0, t.sisaAkhwat||0, data.totalTerjual||0, "Rp " + Number(t.totalUang||0).toLocaleString("id-ID")];
    ctx.fillStyle = "#dbeafe";
    ctx.fillRect(tableX, y, tableW, totalH);
    ctx.font = "bold 20px Segoe UI, Arial";
    let cx = tableX;
    totalVals.forEach((v, idx)=>{
      ctx.fillStyle = idx === 0 ? "#1e3a8a" : "#0f172a";
      ctx.textAlign = idx === 0 ? "left" : "center";
      let tx = idx === 0 ? cx + 16 : cx + cols[idx]/2;
      ctx.fillText(String(v), tx, y + totalH/2);
      cx += cols[idx];
    });

    // summary boxes
    y += totalH + 28;
    let boxW = (tableW - 20) / 2;
    let boxH = 78;
    [["Total Terjual", String(data.totalTerjual || 0)], ["Total Uang", "Rp " + Number((data.total||{}).totalUang || 0).toLocaleString("id-ID")]].forEach((item, idx)=>{
      let bx = tableX + (idx * (boxW + 20));
      ctx.fillStyle = "#eff6ff";
      canvasRoundRect(ctx, bx, y, boxW, boxH, 16);
      ctx.fill();
      ctx.strokeStyle = "#bfdbfe";
      ctx.stroke();
      ctx.fillStyle = "#1e3a8a";
      ctx.textAlign = "left";
      ctx.font = "bold 18px Segoe UI, Arial";
      ctx.fillText(item[0], bx + 22, y + 27);
      ctx.font = "bold 30px Segoe UI, Arial";
      ctx.fillText(item[1], bx + 22, y + 58);
    });

    // footer
    ctx.fillStyle = "#64748b";
    ctx.font = "16px Segoe UI, Arial";
    ctx.textAlign = "center";
    ctx.fillText("Gambar ini dibuat otomatis dari aplikasi Laporan Jajan", width/2, height - 24);

    canvas.toBlob(blob=>{
      if(!blob){
        reject(new Error("Gagal membuat gambar."));
        return;
      }
      resolve(blob);
    }, "image/png", 0.95);
  });
}


function gambarRekapKelompokBlob(grupNama){
  return new Promise((resolve, reject)=>{
    let laporan = window.__rekapKhususLast || {};
    let g = laporan[grupNama];
    let dataBulanan = window.__rekapBulananLast || {};

    if(!g || !Object.keys(g.baris || {}).length){
      reject(new Error("Data kelompok belum siap."));
      return;
    }

    let keys = Object.keys(g.baris).sort((a,b)=>{
      let A = g.baris[a], B = g.baris[b];
      return A.tanggalObj - B.tanggalObj || A.nama.localeCompare(B.nama);
    });

    let width = 1200;
    let headerH = 138;
    let rowH = 50;
    let totalItemCount = Object.keys(g.totalPerItem || {}).length;
    let height = headerH + 54 + (keys.length * rowH) + (totalItemCount * rowH) + 66 + 115;

    let canvas = document.createElement("canvas");
    canvas.width = width;
    canvas.height = height;
    let ctx = canvas.getContext("2d");

    ctx.fillStyle = "#f8fafc";
    ctx.fillRect(0,0,width,height);

    ctx.fillStyle = "#1e3a8a";
    ctx.fillRect(0,0,width,118);
    ctx.fillStyle = "white";
    ctx.font = "bold 39px Segoe UI, Arial";
    ctx.fillText("Laporan " + grupNama, 38, 52);
    ctx.font = "bold 23px Segoe UI, Arial";
    ctx.fillText(dataBulanan.judul || "Rekap Bulanan", 38, 88);
    ctx.textAlign = "right";
    ctx.font = "19px Segoe UI, Arial";
    ctx.fillText("Dibuat: " + new Date().toLocaleString("id-ID"), width - 38, 72);
    ctx.textAlign = "left";

    let tableX = 28, tableY = 138, tableW = width - 56;
    let cols = [255, 230, 105, 105, 115, 155, 180];
    let headers = ["Tanggal", "Item", "Masuk", "Sisa", "Terjual", "Harga", "Total"];

    ctx.fillStyle = "white";
    canvasRoundRect(ctx, tableX, tableY, tableW, height - tableY - 100, 18);
    ctx.fill();

    ctx.fillStyle = "#1e3a8a";
    canvasRoundRect(ctx, tableX, tableY, tableW, 54, 18);
    ctx.fill();
    ctx.fillRect(tableX, tableY+26, tableW, 28);

    let x = tableX;
    ctx.fillStyle = "white";
    ctx.font = "bold 18px Segoe UI, Arial";
    ctx.textBaseline = "middle";
    headers.forEach((h, idx)=>{
      ctx.textAlign = idx < 2 ? "left" : "center";
      ctx.fillText(h, idx < 2 ? x + 14 : x + cols[idx]/2, tableY + 28);
      x += cols[idx];
    });

    let y = tableY + 54;
    ctx.font = "bold 18px Segoe UI, Arial";
    keys.forEach((key, rowIdx)=>{
      let r = g.baris[key];
      let terjual = Math.max(r.masuk - r.sisa, 0);
      let total = terjual * Number(r.harga || 0);
      let vals = [r.tanggalLabel, r.nama, r.masuk, r.sisa, terjual, "Rp " + Number(r.harga||0).toLocaleString("id-ID"), "Rp " + total.toLocaleString("id-ID")];
      ctx.fillStyle = rowIdx % 2 === 0 ? "#ffffff" : "#f1f5f9";
      ctx.fillRect(tableX, y, tableW, rowH);
      let cx = tableX;
      vals.forEach((v, idx)=>{
        ctx.fillStyle = idx < 2 ? "#1e3a8a" : "#0f172a";
        ctx.textAlign = idx < 2 ? "left" : "center";
        ctx.fillText(String(v), idx < 2 ? cx + 14 : cx + cols[idx]/2, y + rowH/2);
        cx += cols[idx];
      });
      y += rowH;
    });

    Object.values(g.totalPerItem).sort((a,b)=>a.nama.localeCompare(b.nama)).forEach(item=>{
      let terjual = Math.max(item.masuk - item.sisa, 0);
      let total = terjual * Number(item.harga || 0);
      let vals = ["TOTAL", item.nama, item.masuk, item.sisa, terjual, "Rp " + Number(item.harga||0).toLocaleString("id-ID"), "Rp " + total.toLocaleString("id-ID")];
      ctx.fillStyle = "#ecfeff";
      ctx.fillRect(tableX, y, tableW, rowH);
      let cx = tableX;
      vals.forEach((v, idx)=>{
        ctx.fillStyle = idx < 2 ? "#155e75" : "#0f172a";
        ctx.textAlign = idx < 2 ? "left" : "center";
        ctx.fillText(String(v), idx < 2 ? cx + 14 : cx + cols[idx]/2, y + rowH/2);
        cx += cols[idx];
      });
      y += rowH;
    });

    // Kolom terjual pada total kelompok tidak dijumlahkan, karena harga item bisa berbeda.
    // Rincian terjual tetap ditampilkan pada masing-masing item di atas.
    let totalVals = ["TOTAL KELOMPOK", grupNama, g.total.masuk, g.total.sisa, "-", "-", "Rp " + g.total.totalUang.toLocaleString("id-ID")];
    ctx.fillStyle = "#dbeafe";
    ctx.fillRect(tableX, y, tableW, 66);
    ctx.font = "bold 20px Segoe UI, Arial";
    let cx = tableX;
    totalVals.forEach((v, idx)=>{
      ctx.fillStyle = idx < 2 ? "#1e3a8a" : "#0f172a";
      ctx.textAlign = idx < 2 ? "left" : "center";
      ctx.fillText(String(v), idx < 2 ? cx + 14 : cx + cols[idx]/2, y + 33);
      cx += cols[idx];
    });

    y += 92;
    ctx.fillStyle = "#1e3a8a";
    ctx.font = "bold 23px Segoe UI, Arial";
    ctx.textAlign = "left";

    let ringkasanCanvas = Object.values(g.totalPerItem || {}).sort((a,b)=>a.nama.localeCompare(b.nama));
    let ringkasanText = ringkasanCanvas.map(item=>{
      let terjual = Math.max(item.masuk - item.sisa, 0);
      return item.nama + ": " + terjual + " pcs";
    }).join("  |  ");

    ctx.fillText(ringkasanText || "Rincian item tidak ada", 42, y);
    ctx.font = "bold 26px Segoe UI, Arial";
    ctx.fillText("Total Kelompok: Rp " + g.total.totalUang.toLocaleString("id-ID"), 42, y + 38);

    ctx.fillStyle = "#64748b";
    ctx.font = "16px Segoe UI, Arial";
    ctx.textAlign = "center";
    ctx.fillText("Laporan otomatis MAQSHOF - kelompok produk dipisah per pemilik", width/2, height - 28);

    canvas.toBlob(blob=>{
      if(!blob){ reject(new Error("Gagal membuat gambar.")); return; }
      resolve(blob);
    }, "image/png", 0.95);
  });
}

async function kirimGambarKelompok(grupNama, btn){
  let oldText = btn ? btn.innerText : "";
  try{
    if(btn){ btn.disabled = true; btn.innerText = "⏳ Buat..."; }

    let data = window.__rekapKhususLast && window.__rekapKhususLast[grupNama];
    if(!data){ alert("Data kelompok belum siap."); return; }

    let blob = await gambarRekapKelompokBlob(grupNama);
    let judul = (window.__rekapBulananLast?.judul || "Rekap Bulanan") + " - " + grupNama;
    let file = new File([blob], buatNamaFileAman(judul), {type:"image/png"});

    let rincianPesan = Object.values(data.totalPerItem || {}).sort((a,b)=>a.nama.localeCompare(b.nama)).map(x=>{
      let terjual = Math.max(x.masuk - x.sisa, 0);
      let total = terjual * Number(x.harga || 0);
      return x.nama + ": " + terjual + " pcs = Rp " + total.toLocaleString("id-ID");
    }).join("\n");

    let pesan = judul +
      "\n\n" + rincianPesan +
      "\n\nTotal Kelompok: Rp " + data.total.totalUang.toLocaleString("id-ID");

    if(navigator.canShare && navigator.canShare({files:[file]}) && navigator.share){
      await navigator.share({title:judul, text:pesan, files:[file]});
      return;
    }

    let url = URL.createObjectURL(blob);
    let a = document.createElement("a");
    a.href = url;
    a.download = buatNamaFileAman(judul);
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(()=>URL.revokeObjectURL(url), 3000);

    window.open("https://wa.me/?text=" + encodeURIComponent(pesan + "\n\nGambar sudah ter-download. Lampirkan PNG tersebut di WhatsApp."), "_blank");
  }catch(err){
    alert("Gagal kirim gambar kelompok: " + err.message);
  }finally{
    if(btn){ btn.disabled = false; btn.innerText = oldText || "📷 Kirim"; }
  }
}

async function kirimGambarRekapBulanan(){
  let btn = document.querySelector(".share-bulanan-btn");
  let oldText = btn ? btn.innerText : "";
  try{
    if(btn){
      btn.disabled = true;
      btn.innerText = "⏳ Membuat gambar...";
    }

    let data = window.__rekapBulananLast;
    if(!data){
      alert("Data bulanan belum siap. Coba buka tab Bulanan lagi.");
      return;
    }

    let blob = await gambarRekapBulananBlob();
    let filename = buatNamaFileAman(data.judul);
    let file = new File([blob], filename, {type:"image/png"});
    let pesan = data.judul + "\nTotal Terjual: " + (data.totalTerjual || 0) + "\nTotal Uang: Rp " + Number((data.total||{}).totalUang || 0).toLocaleString("id-ID");

    // Cara terbaik di HP: Web Share API bisa membuka WhatsApp dengan gambar terlampir.
    if(navigator.canShare && navigator.canShare({files:[file]}) && navigator.share){
      await navigator.share({
        title: data.judul,
        text: pesan,
        files: [file]
      });
      return;
    }

    // Fallback: download gambar dulu, lalu buka WhatsApp berisi pesan.
    let url = URL.createObjectURL(blob);
    let a = document.createElement("a");
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(()=>URL.revokeObjectURL(url), 3000);

    let waUrl = "https://wa.me/?text=" + encodeURIComponent(pesan + "\n\nGambar rekap sudah ter-download. Lampirkan gambar PNG tersebut di WhatsApp.");
    window.open(waUrl, "_blank");
  }catch(err){
    alert("Gagal kirim gambar: " + err.message);
  }finally{
    if(btn){
      btn.disabled = false;
      btn.innerText = oldText || "📷 Kirim Gambar Bulanan ke WA";
    }
  }
}

function toggleModeHapus(){
  modeHapusAktif = !modeHapusAktif;

  const toolbar = document.getElementById("deleteToolbar");
  const btn = document.getElementById("btnModeHapus");

  if(modeHapusAktif){
    toolbar.classList.add("active");
    btn.innerText = "❌ Tutup Menu Hapus";
    btn.style.background = "#64748b";
  }else{
    toolbar.classList.remove("active");
    btn.innerText = "🗑️ Menu Hapus";
    btn.style.background = "#991b1b";
    selectedHapus.clear();
  }

  document.querySelectorAll(".delete-check-wrap").forEach(el=>{
    el.style.display = modeHapusAktif ? "block" : "none";
  });

  document.querySelectorAll(".hapus-check").forEach(cb=>{
    cb.checked = modeHapusAktif && selectedHapus.has(cb.dataset.key);
  });

  document.querySelectorAll(".laporan-card").forEach(card=>card.classList.remove("delete-selected"));
  updateJumlahDipilih();
}

function togglePilihHapus(key, checked){
  if(checked){
    selectedHapus.add(key);
  }else{
    selectedHapus.delete(key);
  }

  let wrap = document.getElementById("checkWrap-"+key);
  let card = wrap ? wrap.closest(".laporan-card") : null;
  if(card){
    card.classList.toggle("delete-selected", checked);
  }

  updateJumlahDipilih();
}

function pilihSemuaHapus(){
  if(!modeHapusAktif) return;

  document.querySelectorAll(".hapus-check").forEach(cb=>{
    cb.checked = true;
    selectedHapus.add(cb.dataset.key);
    let card = cb.closest(".laporan-card");
    if(card) card.classList.add("delete-selected");
  });

  updateJumlahDipilih();
}

function batalkanSemuaHapus(){
  selectedHapus.clear();

  document.querySelectorAll(".hapus-check").forEach(cb=>{
    cb.checked = false;
    let card = cb.closest(".laporan-card");
    if(card) card.classList.remove("delete-selected");
  });

  updateJumlahDipilih();
}

function updateJumlahDipilih(){
  let el = document.getElementById("jumlahDipilih");
  if(el) el.innerText = selectedHapus.size;
}

function hapusYangDipilih(){
  let keys = Array.from(selectedHapus);

  if(keys.length === 0){
    alert("Belum ada transaksi yang dipilih.");
    return;
  }

  let yakin = confirm("Yakin hapus " + keys.length + " transaksi? Data yang dihapus tidak bisa dikembalikan.");
  if(!yakin) return;

  let updates = {};
  keys.forEach(key=>{
    updates["jajan/"+key] = null;
  });

  db.ref().update(updates).then(()=>{
    alert("Berhasil menghapus " + keys.length + " transaksi.");
    selectedHapus.clear();
    modeHapusAktif = false;

    document.getElementById("deleteToolbar").classList.remove("active");
    let btn = document.getElementById("btnModeHapus");
    btn.innerText = "🗑️ Menu Hapus";
    btn.style.background = "#991b1b";

    loadLaporan();
    loadRekap();
    loadRekapBulanan();
  }).catch(err=>{
    alert("Gagal menghapus: " + err.message);
  });
}

function escText(v){
  return String(v ?? "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

function toLocalDatetime(waktu){
  let dateObj = new Date(waktu || Date.now());
  if(isNaN(dateObj)) dateObj = new Date();

  return dateObj.getFullYear() + "-" +
  String(dateObj.getMonth()+1).padStart(2,"0") + "-" +
  String(dateObj.getDate()).padStart(2,"0") + "T" +
  String(dateObj.getHours()).padStart(2,"0") + ":" +
  String(dateObj.getMinutes()).padStart(2,"0");
}


let masterItemsEdit = [];

function loadMasterItemsEdit(){
  if(masterItemsEdit.length) return Promise.resolve(masterItemsEdit);

  return db.ref("items").once("value").then(snap=>{
    let arr = [];
    if(snap.exists()){
      snap.forEach(c=>{
        let d = c.val() || {};
        let nama = d.nama || d.barang || d.name || "";
        if(nama){
          arr.push({
            nama:String(nama).trim(),
            kategori:String(d.kategori||''),
            urutan:Number(d.urutan||d.order||9999)
          });
        }
      });
    }

    arr.sort((a,b)=> a.urutan - b.urutan || a.nama.localeCompare(b.nama));
    masterItemsEdit = arr;
    return masterItemsEdit;
  });
}

font-weight:800;
">
💾 Simpan Perubahan
</button>

<button onclick="lihatRiwayat('${key}')" style="
margin-top:7px;
width:100%;
padding:9px;
background:#64748b;
color:white;
border:none;
border-radius:8px;
font-size:12px;
font-weight:700;
">
📜 Riwayat Edit
</button>

<div id="history-${key}" style="display:none;font-size:12px;margin-top:8px"></div>

</div>
`;

box.style.display="block";

});
}

function rowItemHTML(key, idx, i={}, mode="jumlah"){
  let barang = escText(i.barang || "");
  let jumlah = Number(i.jumlah || 0);
  let masuk = Number(i.masuk || 0);
  let retur = Number(i.retur || 0);

  if(mode === "masukRetur"){
    return `
    <div class="edit-row-${key}" style="background:white;border:1px solid #e2e8f0;border-radius:10px;padding:8px;margin-bottom:8px">
      ${itemSelectHTML(barang)}
      <div style="display:flex;gap:6px;align-items:center">
        <input type="number" placeholder="Masuk" value="${masuk}" data-field="masuk" style="flex:1;padding:8px;border:1px solid #cbd5e1;border-radius:8px">
        <input type="number" placeholder="Retur" value="${retur}" data-field="retur" style="flex:1;padding:8px;border:1px solid #cbd5e1;border-radius:8px">
        <button onclick="hapusBarisEdit(this)" style="border:none;border-radius:8px;background:#dc2626;color:white;padding:8px">🗑️</button>
      </div>
    </div>`;
  }

  return `
  <div class="edit-row-${key}" style="background:white;border:1px solid #e2e8f0;border-radius:10px;padding:8px;margin-bottom:8px">
    ${itemSelectHTML(barang)}
    <div style="display:flex;gap:6px;align-items:center">
      <input type="number" placeholder="Jumlah" value="${jumlah}" data-field="jumlah" style="flex:1;padding:8px;border:1px solid #cbd5e1;border-radius:8px">
      <button onclick="hapusBarisEdit(this)" style="border:none;border-radius:8px;background:#dc2626;color:white;padding:8px">🗑️</button>
    </div>
  </div>`;
}

function tambahBarisEdit(key, mode){
  let wrap = document.getElementById("editItems-"+key);
  wrap.insertAdjacentHTML("afterbegin", rowItemHTML(key, Date.now(), {}, mode));
}

function hapusBarisEdit(btn){
  let row = btn.closest("div[class^='edit-row-']");
  if(row) row.remove();
}

// ================= SIMPAN + RIWAYAT =================
function simpanEdit(key, mode){

db.ref("jajan/"+key).once("value",snap=>{

let oldData = snap.val() || {};
let tglInput = document.getElementById("tglEdit-"+key).value;
let newDate = new Date(tglInput);

if(isNaN(newDate)){
  alert("Tanggal salah!");
  return;
}

let rows = [...document.querySelectorAll(`.edit-row-${key}`)];
let newItems = rows.map((row,index)=>{
  let barang = row.querySelector('[data-field="barang"]').value.trim();
  let lama=(oldData.items||[])[index]||{};
  const norm=s=>(s||"").toString().toLowerCase().replace(/\s+/g," ").trim();
  let master=(masterItemsEdit||[]).find(x=>norm(x.nama)===norm(barang))||{};
  if(!master.nama){
    alert('Item "'+barang+'" tidak ditemukan di master Firebase. Silakan pilih ulang dari dropdown.');
    throw new Error('invalid master');
  }
  let kategori=master.kategori||lama.kategori||"";
  let kelompokLaporan=master.kelompokLaporan||lama.kelompokLaporan||kategori;
  let harga=master.harga??lama.harga??0;
  if(!kategori){
    const byName=(oldData.items||[]).find(i=>norm(i.barang)===norm(barang));
    if(byName&&byName.kategori) kategori=byName.kategori;
  }

  if(mode === "masukRetur"){
    return {
      barang: barang,
      kategori:kategori,
      kelompokLaporan:kelompokLaporan,
      harga:harga,
      masuk: Number(row.querySelector('[data-field="masuk"]').value || 0),
      retur: Number(row.querySelector('[data-field="retur"]').value || 0)
    };
  }

  return {
    barang: barang,
    kategori:kategori,
    kelompokLaporan:kelompokLaporan,
    harga:harga,
    jumlah: Number(row.querySelector('[data-field="jumlah"]').value || 0)
  };
}).filter(i => i.barang !== "");

const norm=s=>(s||'').toString().toLowerCase().replace(/\s+/g,' ').trim();
let masterNames = masterItemsEdit.map(x => norm(x.nama));
let adaItemKosong = rows.some(row => !row.querySelector('[data-field="barang"]').value.trim());
let adaItemTidakValid = newItems.some(i => !masterNames.includes(norm(i.barang)));

if(adaItemKosong){
  alert("Ada item yang belum dipilih. Pilih dari dropdown item dulu.");
  return;
}

if(adaItemTidakValid){
  alert("Ada item yang tidak sesuai master items. Pilih ulang dari dropdown.");
  return;
}

let newData = {
  waktu: newDate.toISOString(),
  jenis: document.getElementById("jenisEdit-"+key).value,
  tempat: document.getElementById("tempatEdit-"+key).value,
  catatan: document.getElementById("catatanEdit-"+key).value.trim(),
  items: newItems
};

let historyData = {
  waktuEdit: new Date().toISOString(),
  sebelum: {
    waktu: oldData.waktu || "",
    jenis: oldData.jenis || "",
    tempat: oldData.tempat || "",
    catatan: oldData.catatan || "",
    items: oldData.items || []
  },
  sesudah: newData
};

// simpan riwayat dulu, lalu update transaksi utama
db.ref("jajan/"+key+"/riwayatEdit").push(historyData).then(()=>{
  return db.ref("jajan/"+key).update(newData);
}).then(()=>{
  alert("Berhasil diupdate");
  loadLaporan();
  loadRekap();
  loadRekapBulanan();
});

});
}

// ================= LIHAT RIWAYAT =================
function lihatRiwayat(key){

let box = document.getElementById("history-"+key);

if(box.style.display==="block"){
  box.style.display="none";
  return;
}

db.ref("jajan/"+key+"/riwayatEdit").once("value",snap=>{

if(!snap.exists()){
  box.innerHTML = "Belum ada riwayat";
  box.style.display="block";
  return;
}

let html = "";

snap.forEach(c=>{
let d = c.val() || {};
let sebelum = d.sebelum || {};
let sesudah = d.sesudah || {};

html += `
<div style="border-top:1px solid #cbd5e1;padding-top:7px;margin-top:7px;line-height:1.5">
<b>${new Date(d.waktuEdit).toLocaleString("id-ID")}</b><br>
Dari: ${escText(sebelum.jenis)} - ${escText(sebelum.tempat)}<br>
Ke: ${escText(sesudah.jenis)} - ${escText(sesudah.tempat)}<br>
Item lama: ${(sebelum.items || []).map(i=>escText(i.barang)+"="+(i.jumlah ?? `M${i.masuk||0}/R${i.retur||0}`)).join(", ")}<br>
Item baru: ${(sesudah.items || []).map(i=>escText(i.barang)+"="+(i.jumlah ?? `M${i.masuk||0}/R${i.retur||0}`)).join(", ")}
</div>
`;
});

box.innerHTML = html;
box.style.display="block";

});
}


// === STAGE1 HARDEN EDIT ===
function normalizeItemName(v){return String(v||'').toLowerCase().trim().replace(/\s+/g,' ');}
function buildMasterMap(){
 window.masterMapEdit={};
 (window.masterItemsEdit||[]).forEach(it=>{
   const k=normalizeItemName(it.nama||it.barang);
   if(k) window.masterMapEdit[k]=it;
 });
}
function getMasterItem(nama){
 if(!window.masterMapEdit) buildMasterMap();
 return window.masterMapEdit[normalizeItemName(nama)]||null;
}
// === END STAGE1 ===

</script>
