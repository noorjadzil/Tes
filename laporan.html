<!DOCTYPE html>
<html>
<head>
<title>Laporan Jajan</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1e3a8a">

<style>
body{
font-family:'Segoe UI',Arial;
margin:0;
background:linear-gradient(135deg,#0f172a,#1e3a8a);
}

.container{
max-width:420px;
margin:auto;
padding:10px;
}

.card{
background:white;
border-radius:16px;
padding:15px;
box-shadow:0 8px 20px rgba(0,0,0,0.2);
}

h2{
text-align:center;
color:#1e3a8a;
}

/* TAB */
.tab-btn{
flex:1;
padding:10px;
border:none;
color:white;
cursor:pointer;
}

.active{ background:#1e3a8a; }
.nonactive{ background:#94a3b8; }

.laporan-card{
background:white;
margin-top:12px;
padding:12px;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.laporan-header{
font-size:18px;
font-weight:700;
color:#1e3a8a;
margin-bottom:6px;
}

.laporan-tanggal{
display:inline-block;
background:#e0edff;
color:#1e3a8a;
padding:4px 10px;
border-radius:8px;
font-size:14px;
font-weight:700;
margin-bottom:8px;
}

.laporan-items{
margin-top:6px;
line-height:1.5;
font-weight:600;
}

img{
width:100%;
border-radius:10px;
margin-top:8px;
}
</style>
</head>

<body>

<div class="container">
<div class="card">

<h2>Laporan Jajan</h2>

<button onclick="kembali()" style="
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#64748b;
color:white;
font-weight:700;
margin-bottom:10px;
">
⬅️ Kembali ke Input
</button>

<div style="display:flex;margin-bottom:10px;">
  <button id="btnLaporan" class="tab-btn active" onclick="showTab('laporan')">Laporan</button>
  <button id="btnRekap" class="tab-btn nonactive" onclick="showTab('rekap')">Rekap</button>
</div>

<div id="tabLaporan">
  <div id="listLaporan">Loading...</div>
</div>

<div id="tabRekap" style="display:none;">
  <div id="rekapHarian">Loading...</div>
</div>

</div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
// =================== NAV ===================
function kembali(){
  window.location.href = "index.html";
}

// =================== TAB ===================
function showTab(tab){
  const laporan = document.getElementById("tabLaporan");
  const rekap = document.getElementById("tabRekap");

  const btnLaporan = document.getElementById("btnLaporan");
  const btnRekap = document.getElementById("btnRekap");

  if(tab==="laporan"){
    laporan.style.display="block";
    rekap.style.display="none";
    btnLaporan.className="tab-btn active";
    btnRekap.className="tab-btn nonactive";
  }else{
    laporan.style.display="none";
    rekap.style.display="block";
    btnLaporan.className="tab-btn nonactive";
    btnRekap.className="tab-btn active";
  }
}

// =================== FIREBASE ===================
const firebaseConfig={
databaseURL:"https://maqshof-d5772-default-rtdb.asia-southeast1.firebasedatabase.app"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.database();

// =================== FORMAT ===================
function formatTanggal(waktu){
let date = new Date(waktu);

let hari = date.toLocaleDateString("id-ID",{weekday:"long"});
let tanggal = date.toLocaleDateString("id-ID",{day:"numeric", month:"long", year:"numeric"});
let jam = date.toLocaleTimeString("id-ID",{hour:"2-digit",minute:"2-digit"});

return `${hari}, ${tanggal} - ${jam}`;
}

function formatTanggalHari(waktu){
let date = new Date(waktu);

let hari = date.toLocaleDateString("id-ID",{weekday:"long"});
let tanggal = date.toLocaleDateString("id-ID",{day:"numeric", month:"long", year:"numeric"});

return `${hari}, ${tanggal}`;
}

// =================== LAPORAN ===================
function loadLaporan(){

let list=document.getElementById("listLaporan");
list.innerHTML="Loading...";

db.ref("jajan").limitToLast(50).once("value",snap=>{

list.innerHTML="";

if(!snap.val()){
list.innerHTML="Belum ada data";
return;
}

// ambil data + key
let arr=[];

snap.forEach(c=>{
  let d = c.val();
  d.key = c.key;
  arr.push(d);
});

arr.reverse();

arr.forEach(d=>{

let items = (d.items || [])
.map(i=>`• ${i.barang} (${i.jumlah})`)
.join("<br>");

let div=document.createElement("div");
div.className="laporan-card";

div.innerHTML=`
<div class="laporan-header">
${d.jenis} - ${d.tempat}

${d.riwayatEdit ? '<span style="color:red;font-size:12px"> (edited)</span>' : ''}

<span onclick="toggleEdit('${d.key}')" style="cursor:pointer;float:right">✏️</span>
</div>

<div class="laporan-tanggal" id="tgl-${d.key}">
${formatTanggal(d.waktu)}
</div>

<div class="laporan-items" id="items-${d.key}">
${items}
</div>

<div id="edit-${d.key}" style="display:none;margin-top:10px"></div>

${d.catatan ? `
<div style="margin-top:8px;font-weight:700;color:#dc2626">
Catatan: ${d.catatan}
</div>
` : ""}

${d.foto ? `<img src="${d.foto}">` : ""}
`;

list.appendChild(div);

});

});
}

// =================== REKAP (FINAL FIX) ===================
function loadRekap(){

let container=document.getElementById("rekapHarian");
container.innerHTML="Loading...";

// ambil harga item
db.ref("items").once("value",snapItem=>{

let hargaMap = {};

if(snapItem.exists()){
snapItem.forEach(c=>{
let d = c.val();
let nama = (d.nama || "").toLowerCase().trim();
hargaMap[nama] = Number(d.harga || 0);
});
}

// ambil data jajan
db.ref("jajan").once("value",snap=>{

if(!snap.exists()){
container.innerHTML="Belum ada data";
return;
}

let data=Object.values(snap.val());
let grup={};

data.forEach(d=>{

if(!d.waktu) return;

let dateObj = new Date(d.waktu);
if(isNaN(dateObj)) return;

let key = dateObj.toLocaleDateString("id-ID", {
  year: "numeric",
  month: "2-digit",
  day: "2-digit"
});

let label = formatTanggalHari(dateObj);

if(!grup[key]){
grup[key]={
label: label,
masukIkhwan:0,
masukAkhwat:0,
sisaIkhwan:0,
sisaAkhwat:0,
totalUang:0
};
}

let jenis = (d.jenis || "").toLowerCase();
let tempat = (d.tempat || "").toLowerCase();

// loop item
(d.items || []).forEach(i=>{

let nama = (i.barang || "").toLowerCase().trim();
let jumlah = Number(i.jumlah || 0);
let harga = hargaMap[nama] || 0;

let subtotal = jumlah * harga;

// masuk
if(jenis.includes("masuk") && tempat.includes("ikhwan")){
  grup[key].masukIkhwan += jumlah;
  grup[key].totalUang += subtotal;
}

if(jenis.includes("masuk") && tempat.includes("akhwat")){
  grup[key].masukAkhwat += jumlah;
  grup[key].totalUang += subtotal;
}

// sisa
if(jenis.includes("sisa") && tempat.includes("ikhwan")){
  grup[key].sisaIkhwan += jumlah;
}

if(jenis.includes("sisa") && tempat.includes("akhwat")){
  grup[key].sisaAkhwat += jumlah;
}

});

});

// render
container.innerHTML="";

Object.keys(grup)
.sort((a,b)=> new Date(b) - new Date(a))
.forEach(key=>{

let g = grup[key];

let terjual = (g.masukIkhwan + g.masukAkhwat) - (g.sisaIkhwan + g.sisaAkhwat);
if(terjual < 0) terjual = 0;

let div=document.createElement("div");
div.className="laporan-card";

div.innerHTML=`
<div class="laporan-header">Rekap</div>
<div class="laporan-tanggal">${g.label}</div>

<div class="laporan-items">
Masuk Ikhwan: ${g.masukIkhwan}<br>
Masuk Akhwat: ${g.masukAkhwat}<br>
Sisa Ikhwan: ${g.sisaIkhwan}<br>
Sisa Akhwat: ${g.sisaAkhwat}<br><br>

<b>Terjual: ${terjual}</b><br>
<b>Total: Rp ${g.totalUang.toLocaleString("id-ID")}</b>
</div>
`;

container.appendChild(div);

});

});

});
}

// =================== INIT ===================
loadLaporan();
loadRekap();

db.ref("config").once("value",snap=>{
let c=snap.val();
if(!c) return;

if(c.label){
document.querySelector("h2").innerText="Laporan "+c.label;
}

if(c.theme){
document.body.style.background=
`linear-gradient(135deg,${c.theme.bg},${c.theme.primary})`;
}
});
// ================= EDIT JUMLAH =================
function editJumlah(key, index, oldValue){

let baru = prompt("Ubah jumlah", oldValue);
if(baru===null) return;

db.ref("jajan/"+key+"/items").once("value",snap=>{

let items = snap.val() || [];

if(!items[index]) return;

items[index].jumlah = Number(baru);

db.ref("jajan/"+key).update({
  items: items
}).then(()=>{
  loadLaporan();
});

});

}

// ================= EDIT TANGGAL =================
function editTanggal(key, oldWaktu){

let dateObj = new Date(oldWaktu);

let local = dateObj.getFullYear() + "-" +
String(dateObj.getMonth()+1).padStart(2,"0") + "-" +
String(dateObj.getDate()).padStart(2,"0") + " " +
String(dateObj.getHours()).padStart(2,"0") + ":" +
String(dateObj.getMinutes()).padStart(2,"0");

let input = prompt("Edit tanggal (YYYY-MM-DD HH:mm)", local);
if(input===null) return;

let newDate = new Date(input);

if(isNaN(newDate)){
  alert("Format salah!");
  return;
}

db.ref("jajan/"+key).update({
  waktu: newDate.toISOString()
}).then(()=>{
  loadLaporan();
});

}

// ================= EDIT TOGGLE =================
function toggleEdit(key){

let box = document.getElementById("edit-"+key);

if(box.style.display==="block"){
  box.style.display="none";
  box.innerHTML="";
  return;
}

db.ref("jajan/"+key).once("value",snap=>{

let d = snap.val();

// format tanggal
let dateObj = new Date(d.waktu);
let local = dateObj.getFullYear() + "-" +
String(dateObj.getMonth()+1).padStart(2,"0") + "-" +
String(dateObj.getDate()).padStart(2,"0") + "T" +
String(dateObj.getHours()).padStart(2,"0") + ":" +
String(dateObj.getMinutes()).padStart(2,"0");

// item
let itemsHTML = (d.items || []).map((i,idx)=>`
<div style="display:flex;justify-content:space-between;margin-bottom:6px">
  <span>${i.barang}</span>
  <input type="number" value="${i.jumlah}" 
  id="jml-${key}-${idx}" 
  style="width:70px;padding:4px;border-radius:6px;border:1px solid #ccc">
</div>
`).join("");

box.innerHTML = `
<div style="background:#f8fafc;padding:10px;border-radius:10px;border:1px solid #e2e8f0">

<b style="color:#1e3a8a">Edit Data</b><br><br>

Tanggal:<br>
<input type="datetime-local" id="tglEdit-${key}" value="${local}" 
style="width:100%;padding:6px;border:1px solid #ccc;border-radius:6px"><br><br>

${itemsHTML}

<button onclick="simpanEdit('${key}')" style="
margin-top:10px;
width:100%;
padding:10px;
background:#1e3a8a;
color:white;
border:none;
border-radius:8px;
font-weight:700;
">
💾 Simpan
</button>

<button onclick="lihatRiwayat('${key}')" style="
margin-top:6px;
width:100%;
padding:8px;
background:#64748b;
color:white;
border:none;
border-radius:6px;
font-size:12px;
">
📜 Riwayat Edit
</button>

<div id="history-${key}" style="display:none;font-size:12px;margin-top:8px"></div>

</div>
`;

box.style.display="block";

});
}


// ================= SIMPAN + RIWAYAT =================
function simpanEdit(key){

db.ref("jajan/"+key).once("value",snap=>{

let oldData = snap.val();
let items = oldData.items || [];

// tanggal
let tglInput = document.getElementById("tglEdit-"+key).value;
let newDate = new Date(tglInput);

if(isNaN(newDate)){
  alert("Tanggal salah!");
  return;
}

// ambil item baru
let newItems = items.map((i,idx)=>{
  let val = document.getElementById(`jml-${key}-${idx}`).value;
  return {
    barang: i.barang,
    jumlah: Number(val || 0)
  };
});

// data baru
let newData = {
  waktu: newDate.toISOString(),
  items: newItems
};

// 🔥 simpan riwayat
db.ref("jajan/"+key+"/riwayatEdit").push({
  waktuEdit: new Date().toISOString(),
  sebelum: oldData.items,
  sesudah: newItems
});

// 🔥 update utama
db.ref("jajan/"+key).update(newData).then(()=>{
  alert("Berhasil diupdate");
  loadLaporan();
});

});
}


// ================= LIHAT RIWAYAT =================
function lihatRiwayat(key){

let box = document.getElementById("history-"+key);

if(box.style.display==="block"){
  box.style.display="none";
  return;
}

db.ref("jajan/"+key+"/riwayatEdit").once("value",snap=>{

if(!snap.exists()){
  box.innerHTML = "Belum ada riwayat";
  box.style.display="block";
  return;
}

let html = "";

snap.forEach(c=>{
let d = c.val();

html += `
<div style="border-top:1px solid #ccc;padding-top:5px;margin-top:5px">
<b>${new Date(d.waktuEdit).toLocaleString("id-ID")}</b><br>
Sebelum: ${d.sebelum.map(i=>i.jumlah).join(", ")}<br>
Sesudah: ${d.sesudah.map(i=>i.jumlah).join(", ")}
</div>
`;
});

box.innerHTML = html;
box.style.display="block";

});
}
</script>

</body>
</html>
