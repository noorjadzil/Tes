<!DOCTYPE html>
<html>
<head>
<title>Maqshof Ikhwa - Modern v2</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1e3a8a">

<style>
:root{
  --navy:#1e3a8a;
  --navy-dark:#0f172a;
  --blue:#2563eb;
  --green:#16a34a;
  --red:#dc2626;
  --slate:#64748b;
  --line:#e2e8f0;
  --soft:#f8fafc;
  --soft-blue:#eff6ff;
  --text:#0f172a;
  --muted:#64748b;
  --radius:18px;
  --shadow:0 18px 45px rgba(15,23,42,.16);
}

*{box-sizing:border-box}

body{
  font-family:'Segoe UI',Arial,sans-serif;
  margin:0;
  min-height:100vh;
  color:var(--text);
  background:
    radial-gradient(circle at top left, rgba(37,99,235,.35), transparent 34%),
    linear-gradient(135deg,#08111f,#1e3a8a 58%,#0f766e);
}

.container{
  max-width:460px;
  margin:auto;
  padding:14px;
}

.card{
  background:rgba(255,255,255,.96);
  border:1px solid rgba(255,255,255,.55);
  border-radius:26px;
  padding:16px;
  box-shadow:var(--shadow);
  backdrop-filter:blur(14px);
}

h2{
  text-align:center;
  color:var(--navy);
  margin:4px 0 16px;
  font-size:24px;
  letter-spacing:.2px;
}

button,select,input,textarea{
  font-family:inherit;
}

button{
  transition:.18s ease;
}

button:active{
  transform:scale(.98);
}

/* TAB */
.tab-btn{
  flex:1;
  padding:11px 8px;
  border:none;
  color:white;
  cursor:pointer;
  font-weight:900;
  font-size:13px;
}

.tab-btn:first-child{border-radius:14px 0 0 14px}
.tab-btn:last-child{border-radius:0 14px 14px 0}

.active{
  background:linear-gradient(135deg,#1e3a8a,#2563eb);
  box-shadow:inset 0 -2px 0 rgba(255,255,255,.18);
}
.nonactive{ background:#94a3b8; }

.laporan-card{
  background:linear-gradient(180deg,#ffffff,#f8fafc);
  margin-top:14px;
  padding:14px;
  border:1px solid rgba(226,232,240,.95);
  border-radius:20px;
  box-shadow:0 10px 26px rgba(15,23,42,.08);
}

.laporan-header{
  font-size:18px;
  font-weight:900;
  color:var(--navy);
  margin-bottom:8px;
  letter-spacing:.1px;
}

.laporan-tanggal{
  display:inline-flex;
  align-items:center;
  background:#e0edff;
  color:var(--navy);
  padding:6px 11px;
  border-radius:999px;
  font-size:13px;
  font-weight:900;
  margin-bottom:8px;
}

.laporan-items{
  margin-top:8px;
  line-height:1.6;
  font-weight:700;
  color:#334155;
}

.delete-toolbar{
  background:#fff7f7;
  border:1px solid #fecaca;
  border-radius:18px;
  padding:12px;
  margin-bottom:12px;
  display:none;
}

.delete-toolbar.active{display:block;}

.delete-actions{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  margin-top:10px;
}

.delete-actions button,.delete-toggle-btn{
  border:none;
  border-radius:13px;
  padding:11px;
  font-weight:900;
  cursor:pointer;
}

.delete-toggle-btn{
  width:100%;
  background:linear-gradient(135deg,#991b1b,#dc2626);
  color:white;
  margin-bottom:12px;
  box-shadow:0 8px 18px rgba(153,27,27,.18);
}

.delete-check-wrap{
  display:none;
  margin-bottom:9px;
  background:#fee2e2;
  color:#991b1b;
  font-weight:900;
  padding:9px 10px;
  border-radius:13px;
}

.delete-check-wrap input{
  transform:scale(1.25);
  margin-right:8px;
}

.laporan-card.delete-selected{
  outline:3px solid #ef4444;
  background:#fff7f7;
}

.rekap-table-wrap,.khusus-table-wrap{
  overflow-x:auto;
  margin-top:12px;
  border:1px solid var(--line);
  border-radius:16px;
  background:white;
  box-shadow:inset 0 0 0 1px rgba(255,255,255,.5);
}

.rekap-table,.khusus-table{
  width:100%;
  border-collapse:separate;
  border-spacing:0;
  font-size:12px;
  background:white;
}

.rekap-table{min-width:760px;}
.khusus-table{min-width:720px;}

.rekap-table th,.khusus-table th{
  background:linear-gradient(135deg,#1e3a8a,#2563eb);
  color:white;
  padding:10px 7px;
  text-align:center;
  position:sticky;
  top:0;
  white-space:nowrap;
  font-weight:900;
}

.rekap-table th:first-child,.khusus-table th:first-child{border-top-left-radius:15px;}
.rekap-table th:last-child,.khusus-table th:last-child{border-top-right-radius:15px;}

.rekap-table td,.khusus-table td{
  border-bottom:1px solid #edf2f7;
  padding:9px 7px;
  text-align:center;
  font-weight:800;
  white-space:nowrap;
}

.rekap-table tbody tr:nth-child(even),
.khusus-table tbody tr:nth-child(even):not(.item-khusus-total):not(.khusus-grand-total){background:#f8fafc;}

.rekap-table td:first-child,
.rekap-table th:first-child{
  text-align:left;
  position:sticky;
  left:0;
  z-index:2;
}

.rekap-table td:first-child,
.khusus-table td:first-child,
.khusus-table td:nth-child(2){
  color:var(--navy);
  font-weight:900;
}

.rekap-table td:first-child{background:#f8fafc;}

.rekap-filter{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:9px;
  margin:12px 0;
}

.rekap-filter select{
  width:100%;
  padding:11px 12px;
  border:1px solid #cbd5e1;
  border-radius:14px;
  font-weight:900;
  color:var(--navy);
  background:white;
  outline:none;
}

.rekap-summary,.khusus-summary{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:9px;
  margin-top:12px;
}

.rekap-summary div,.khusus-summary div{
  background:linear-gradient(180deg,#eff6ff,#ffffff);
  border:1px solid #bfdbfe;
  border-radius:16px;
  padding:11px;
  font-size:12px;
  font-weight:900;
  color:var(--navy);
  box-shadow:0 6px 16px rgba(30,58,138,.07);
}

.share-bulanan-btn,.khusus-share-btn{
  border:none;
  border-radius:14px;
  background:linear-gradient(135deg,#16a34a,#22c55e);
  color:white;
  font-weight:900;
  cursor:pointer;
  box-shadow:0 10px 20px rgba(22,163,74,.20);
}

.share-bulanan-btn{
  width:100%;
  margin-top:12px;
  padding:13px;
}

.share-bulanan-btn:disabled,.khusus-share-btn:disabled{
  background:#94a3b8;
  cursor:not-allowed;
  box-shadow:none;
}

.share-note,.detail-note{
  font-size:12px;
  color:var(--muted);
  font-weight:700;
  line-height:1.45;
}

.share-note{margin-top:8px;}
.detail-note{margin:6px 0 9px;}

.detail-khusus-title{
  margin-top:18px;
  font-weight:900;
  color:var(--navy);
  font-size:17px;
  padding-left:9px;
  border-left:5px solid #2563eb;
}

.khusus-group-card{
  background:linear-gradient(180deg,#ffffff,#f8fbff);
  border:1px solid #dbeafe;
  border-radius:22px;
  padding:14px;
  margin-top:15px;
  box-shadow:0 12px 28px rgba(30,58,138,0.10);
}

.khusus-group-head{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:10px;
  margin-bottom:10px;
}

.khusus-group-title{
  font-size:17px;
  font-weight:950;
  color:var(--navy);
  line-height:1.25;
}

.khusus-share-btn{
  width:auto;
  min-width:104px;
  margin:0;
  padding:10px 12px;
  font-size:12px;
  white-space:nowrap;
}

.item-khusus-total{
  background:#ecfeff!important;
  font-weight:950;
}
.khusus-grand-total{
  background:#dbeafe!important;
  font-weight:950;
}

img{
  width:100%;
  border-radius:15px;
  margin-top:10px;
  border:1px solid #e2e8f0;
}

@media (max-width:380px){
  .container{padding:10px;}
  .card{padding:13px;border-radius:22px;}
  .khusus-group-head{flex-direction:column;}
  .khusus-share-btn{width:100%;}
  .rekap-summary,.khusus-summary{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<div class="container">
<div class="card">

<h2>Maqshof Ikhwa</h2>

<button onclick="kembali()" style="
width:100%;
padding:12px;
border:none;
border-radius:14px;
background:linear-gradient(135deg,#64748b,#334155);
color:white;
font-weight:900;
margin-bottom:12px;
box-shadow:0 8px 18px rgba(15,23,42,.14);
">
⬅️ Kembali ke Input
</button>

<div style="display:flex;margin-bottom:10px;">
  <button id="btnLaporan" class="tab-btn active" onclick="showTab('laporan')" style="border-radius:14px;width:100%">Laporan Harian</button>
</div>

<button id="btnModeHapus" class="delete-toggle-btn" onclick="toggleModeHapus()">🗑️ Menu Hapus</button>

<div id="deleteToolbar" class="delete-toolbar">
  <b style="color:#991b1b">Mode Hapus Transaksi</b><br>
  <span style="font-size:12px;color:#64748b">Centang transaksi yang ingin dihapus. Bisa pilih semua, lalu batalkan sebagian.</span>

  <div class="delete-actions">
    <button onclick="pilihSemuaHapus()" style="background:#1e3a8a;color:white">✅ Pilih Semua</button>
    <button onclick="batalkanSemuaHapus()" style="background:#64748b;color:white">↩️ Batalkan Semua</button>
  </div>

  <button onclick="hapusYangDipilih()" style="margin-top:8px;width:100%;border:none;border-radius:10px;background:#dc2626;color:white;padding:11px;font-weight:900">
    Hapus yang Dipilih (<span id="jumlahDipilih">0</span>)
  </button>
</div>

<div id="tabLaporan">
  <div id="listLaporan">Loading...</div>
  <div id="laporanKelompok"></div>
</div>

</div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js">
function namaHariIndonesia(t){
 const h=['Ahad','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu'];
 return h[new Date(t).getDay()];
}
function pesanSimple(d){
 return (d.items||[]).map(i=>`${i.barang} ${Number(i.jumlah||i.masuk||0)}`).join("\n");
}
function pesanLengkap(d){
 let hari=namaHariIndonesia(d.waktu);
 let tgl=new Date(d.waktu).toLocaleDateString('id-ID',{day:'numeric',month:'long',year:'numeric'});
 let isi=(d.items||[]).map(i=>`${i.barang} ${Number(i.jumlah||i.masuk||0)}`).join("\n");
 return `${d.tempat}\n\n${hari}, ${tgl}\n\nMasuk:\n\n${isi}`;
}
function copySimple(k){let d=dataLaporan[k]; navigator.clipboard.writeText(pesanSimple(d)); alert('Berhasil disalin');}
function copyFull(k){let d=dataLaporan[k]; navigator.clipboard.writeText(pesanLengkap(d)); alert('Berhasil disalin');}
function sendWA(k){let d=dataLaporan[k]; window.open('https://wa.me/?text='+encodeURIComponent(pesanSimple(d)),'_blank');}
function sendWAFull(k){let d=dataLaporan[k]; window.open('https://wa.me/?text='+encodeURIComponent(pesanLengkap(d)),'_blank');}

</script>

<script>
// =================== NAV ===================
function kembali(){
  window.location.href = "index.html";
}

// =================== TAB ===================
function showTab(tab){
  document.getElementById("tabLaporan").style.display="block";
}
// =================== FIREBASE ===================
const firebaseConfig={
databaseURL:"https://maqshof-d5772-default-rtdb.asia-southeast1.firebasedatabase.app"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.database();

let modeHapusAktif = false;
let selectedHapus = new Set();

// =================== FORMAT ===================
function formatTanggal(waktu){
let date = new Date(waktu);

let hari = date.toLocaleDateString("id-ID",{weekday:"long"});
let tanggal = date.toLocaleDateString("id-ID",{day:"numeric", month:"long", year:"numeric"});
let jam = date.toLocaleTimeString("id-ID",{hour:"2-digit",minute:"2-digit"});

return `${hari}, ${tanggal} - ${jam}`;
}

function formatTanggalHari(waktu){
let date = new Date(waktu);

let hari = date.toLocaleDateString("id-ID",{weekday:"long"});
let tanggal = date.toLocaleDateString("id-ID",{day:"numeric", month:"long", year:"numeric"});

return `${hari}, ${tanggal}`;
}

// =================== LAPORAN ===================
function loadLaporan(){

let list=document.getElementById("listLaporan");
list.innerHTML="Loading...";

db.ref("jajan").limitToLast(50).once("value",snap=>{

list.innerHTML="";

if(!snap.val()){
list.innerHTML="Belum ada data";
return;
}

// ambil data + key
let arr=[];

snap.forEach(c=>{
  let d = c.val();
  d.key = c.key;
  arr.push(d);
});

arr.reverse();

arr.forEach(d=>{
window.dataLaporan=window.dataLaporan||{}; window.dataLaporan[d.key]=d;

let items = (d.items || [])
.map(i=>{
  if(i.masuk !== undefined || i.retur !== undefined){
    return `• ${i.barang} - Masuk: ${Number(i.masuk||0)}, Retur: ${Number(i.retur||0)}`;
  }
  return `• ${i.barang} (${Number(i.jumlah||0)})`;
})
.join("<br>");

let div=document.createElement("div");
div.className="laporan-card";

div.innerHTML=`
<label class="delete-check-wrap" id="checkWrap-${d.key}">
  <input type="checkbox" class="hapus-check" data-key="${d.key}" onchange="togglePilihHapus('${d.key}', this.checked)">
  Pilih untuk dihapus
</label>
<div class="laporan-header">
${d.jenis} - ${d.tempat}

${d.riwayatEdit ? '<span style="color:red;font-size:12px"> (edited)</span>' : ''}

<span onclick="toggleEdit('${d.key}')" style="cursor:pointer;float:right">✏️</span>
</div>

<div class="laporan-tanggal" id="tgl-${d.key}">
${formatTanggal(d.waktu)}
</div>

<div style="display:flex;gap:6px;margin:8px 0;flex-wrap:wrap">
<button onclick="copySimple('${d.key}')" style="padding:6px 10px">📋 Salin</button>
<button onclick="sendWA('${d.key}')" style="padding:6px 10px">📱 WA</button>
<button onclick="copyFull('${d.key}')" style="padding:6px 10px">📄 Salin Lengkap</button>
<button onclick="sendWAFull('${d.key}')" style="padding:6px 10px">🟢 WA Lengkap</button>
</div>

<div class="laporan-items" id="items-${d.key}">
${items}
</div>

<div id="edit-${d.key}" style="display:none;margin-top:10px"></div>

${d.catatan ? `
<div style="margin-top:8px;font-weight:700;color:#dc2626">
Catatan: ${d.catatan}
</div>
` : ""}

${d.foto ? `<img src="${d.foto}">` : ""}
`;

list.appendChild(div);
if(modeHapusAktif){
  let wrap = document.getElementById("checkWrap-"+d.key);
  let cb = div.querySelector('.hapus-check');
  if(wrap) wrap.style.display = "block";
  if(cb) cb.checked = selectedHapus.has(d.key);
  if(selectedHapus.has(d.key)) div.classList.add("delete-selected");
}

});

});
}




function toggleModeHapus(){
  modeHapusAktif = !modeHapusAktif;

  const toolbar = document.getElementById("deleteToolbar");
  const btn = document.getElementById("btnModeHapus");

  if(modeHapusAktif){
    toolbar.classList.add("active");
    btn.innerText = "❌ Tutup Menu Hapus";
    btn.style.background = "#64748b";
  }else{
    toolbar.classList.remove("active");
    btn.innerText = "🗑️ Menu Hapus";
    btn.style.background = "#991b1b";
    selectedHapus.clear();
  }

  document.querySelectorAll(".delete-check-wrap").forEach(el=>{
    el.style.display = modeHapusAktif ? "block" : "none";
  });

  document.querySelectorAll(".hapus-check").forEach(cb=>{
    cb.checked = modeHapusAktif && selectedHapus.has(cb.dataset.key);
  });

  document.querySelectorAll(".laporan-card").forEach(card=>card.classList.remove("delete-selected"));
  updateJumlahDipilih();
}

function togglePilihHapus(key, checked){
  if(checked){
    selectedHapus.add(key);
  }else{
    selectedHapus.delete(key);
  }

  let wrap = document.getElementById("checkWrap-"+key);
  let card = wrap ? wrap.closest(".laporan-card") : null;
  if(card){
    card.classList.toggle("delete-selected", checked);
  }

  updateJumlahDipilih();
}

function pilihSemuaHapus(){
  if(!modeHapusAktif) return;

  document.querySelectorAll(".hapus-check").forEach(cb=>{
    cb.checked = true;
    selectedHapus.add(cb.dataset.key);
    let card = cb.closest(".laporan-card");
    if(card) card.classList.add("delete-selected");
  });

  updateJumlahDipilih();
}

function batalkanSemuaHapus(){
  selectedHapus.clear();

  document.querySelectorAll(".hapus-check").forEach(cb=>{
    cb.checked = false;
    let card = cb.closest(".laporan-card");
    if(card) card.classList.remove("delete-selected");
  });

  updateJumlahDipilih();
}

function updateJumlahDipilih(){
  let el = document.getElementById("jumlahDipilih");
  if(el) el.innerText = selectedHapus.size;
}

function hapusYangDipilih(){
  let keys = Array.from(selectedHapus);

  if(keys.length === 0){
    alert("Belum ada transaksi yang dipilih.");
    return;
  }

  let yakin = confirm("Yakin hapus " + keys.length + " transaksi? Data yang dihapus tidak bisa dikembalikan.");
  if(!yakin) return;

  let updates = {};
  keys.forEach(key=>{
    updates["jajan/"+key] = null;
  });

  db.ref().update(updates).then(()=>{
    alert("Berhasil menghapus " + keys.length + " transaksi.");
    selectedHapus.clear();
    modeHapusAktif = false;

    document.getElementById("deleteToolbar").classList.remove("active");
    let btn = document.getElementById("btnModeHapus");
    btn.innerText = "🗑️ Menu Hapus";
    btn.style.background = "#991b1b";

    loadLaporan();
    
    
  }).catch(err=>{
    alert("Gagal menghapus: " + err.message);
  });
}

// =================== INIT ===================
loadLaporan();



db.ref("config").once("value",snap=>{
let c=snap.val();
if(!c) return;

if(c.label){
document.querySelector("h2").innerText="Laporan "+c.label;
}

if(c.theme){
document.body.style.background=
`linear-gradient(135deg,${c.theme.bg},${c.theme.primary})`;
}
});
// ================= EDIT TRANSAKSI LENGKAP =================
function escText(v){
  return String(v ?? "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

function toLocalDatetime(waktu){
  let dateObj = new Date(waktu || Date.now());
  if(isNaN(dateObj)) dateObj = new Date();

  return dateObj.getFullYear() + "-" +
  String(dateObj.getMonth()+1).padStart(2,"0") + "-" +
  String(dateObj.getDate()).padStart(2,"0") + "T" +
  String(dateObj.getHours()).padStart(2,"0") + ":" +
  String(dateObj.getMinutes()).padStart(2,"0");
}


let masterItemsEdit = [];

function loadMasterItemsEdit(){
  if(masterItemsEdit.length) return Promise.resolve(masterItemsEdit);

  return db.ref("items").once("value").then(snap=>{
    let arr = [];
    if(snap.exists()){
      snap.forEach(c=>{
        let d = c.val() || {};
        let nama = d.nama || d.barang || d.name || "";
        if(nama){
          arr.push({
            nama: String(nama).trim(),
            urutan: Number(d.urutan || d.order || 9999)
          });
        }
      });
    }

    arr.sort((a,b)=> a.urutan - b.urutan || a.nama.localeCompare(b.nama));
    masterItemsEdit = arr;
    return masterItemsEdit;
  });
}

function itemSelectHTML(selectedBarang){
  let selected = String(selectedBarang || "").trim();
  let found = masterItemsEdit.some(x => x.nama.toLowerCase() === selected.toLowerCase());

  let html = `<select data-field="barang" style="width:100%;padding:8px;border:1px solid #cbd5e1;border-radius:8px;margin-bottom:6px">`;

  if(!selected){
    html += `<option value="" selected>-- Pilih item --</option>`;
  }else if(!found){
    html += `<option value="" selected>⚠️ Pilih ulang: ${escText(selected)}</option>`;
  }else{
    html += `<option value="">-- Pilih item --</option>`;
  }

  masterItemsEdit.forEach(x=>{
    let isSel = x.nama.toLowerCase() === selected.toLowerCase() ? "selected" : "";
    html += `<option value="${escText(x.nama)}" ${isSel}>${escText(x.nama)}</option>`;
  });

  html += `</select>`;
  return html;
}

function itemMode(items){
  return (items || []).some(i => i.masuk !== undefined || i.retur !== undefined) ? "masukRetur" : "jumlah";
}

function rowItemHTML(key, idx, i={}, mode="jumlah"){
  let barang = escText(i.barang || "");
  let jumlah = Number(i.jumlah || 0);
  let masuk = Number(i.masuk || 0);
  let retur = Number(i.retur || 0);

  if(mode === "masukRetur"){
    return `
    <div class="edit-row-${key}" style="background:white;border:1px solid #e2e8f0;border-radius:10px;padding:8px;margin-bottom:8px">
      ${itemSelectHTML(barang)}
      <div style="display:flex;gap:6px;align-items:center">
        <input type="number" placeholder="Masuk" value="${masuk}" data-field="masuk" style="flex:1;padding:8px;border:1px solid #cbd5e1;border-radius:8px">
        <input type="number" placeholder="Retur" value="${retur}" data-field="retur" style="flex:1;padding:8px;border:1px solid #cbd5e1;border-radius:8px">
        <button onclick="hapusBarisEdit(this)" style="border:none;border-radius:8px;background:#dc2626;color:white;padding:8px">🗑️</button>
      </div>
    </div>`;
  }

  return `
  <div class="edit-row-${key}" style="background:white;border:1px solid #e2e8f0;border-radius:10px;padding:8px;margin-bottom:8px">
    ${itemSelectHTML(barang)}
    <div style="display:flex;gap:6px;align-items:center">
      <input type="number" placeholder="Jumlah" value="${jumlah}" data-field="jumlah" style="flex:1;padding:8px;border:1px solid #cbd5e1;border-radius:8px">
      <button onclick="hapusBarisEdit(this)" style="border:none;border-radius:8px;background:#dc2626;color:white;padding:8px">🗑️</button>
    </div>
  </div>`;
}

function tambahBarisEdit(key, mode){
  let wrap = document.getElementById("editItems-"+key);
  wrap.insertAdjacentHTML("beforeend", rowItemHTML(key, Date.now(), {}, mode));
}

function hapusBarisEdit(btn){
  let row = btn.closest("div[class^='edit-row-']");
  if(row) row.remove();
}

// ================= SIMPAN + RIWAYAT =================
function simpanEdit(key, mode){

db.ref("jajan/"+key).once("value",snap=>{

let oldData = snap.val() || {};
let tglInput = document.getElementById("tglEdit-"+key).value;
let newDate = new Date(tglInput);

if(isNaN(newDate)){
  alert("Tanggal salah!");
  return;
}

let rows = [...document.querySelectorAll(`.edit-row-${key}`)];
let newItems = rows.map(row=>{
  let barang = row.querySelector('[data-field="barang"]').value.trim();

  if(mode === "masukRetur"){
    return {
      barang: barang,
      masuk: Number(row.querySelector('[data-field="masuk"]').value || 0),
      retur: Number(row.querySelector('[data-field="retur"]').value || 0)
    };
  }

  return {
    barang: barang,
    jumlah: Number(row.querySelector('[data-field="jumlah"]').value || 0)
  };
}).filter(i => i.barang !== "");

let masterNames = masterItemsEdit.map(x => x.nama.toLowerCase());
let adaItemKosong = rows.some(row => !row.querySelector('[data-field="barang"]').value.trim());
let adaItemTidakValid = newItems.some(i => !masterNames.includes(i.barang.toLowerCase()));

if(adaItemKosong){
  alert("Ada item yang belum dipilih. Pilih dari dropdown item dulu.");
  return;
}

if(adaItemTidakValid){
  alert("Ada item yang tidak sesuai master items. Pilih ulang dari dropdown.");
  return;
}

let newData = {
  waktu: newDate.toISOString(),
  jenis: document.getElementById("jenisEdit-"+key).value,
  tempat: document.getElementById("tempatEdit-"+key).value,
  catatan: document.getElementById("catatanEdit-"+key).value.trim(),
  items: newItems
};

let historyData = {
  waktuEdit: new Date().toISOString(),
  sebelum: {
    waktu: oldData.waktu || "",
    jenis: oldData.jenis || "",
    tempat: oldData.tempat || "",
    catatan: oldData.catatan || "",
    items: oldData.items || []
  },
  sesudah: newData
};

// simpan riwayat dulu, lalu update transaksi utama
db.ref("jajan/"+key+"/riwayatEdit").push(historyData).then(()=>{
  return db.ref("jajan/"+key).update(newData);
}).then(()=>{
  alert("Berhasil diupdate");
  loadLaporan();
  
  
});

});
}

// ================= LIHAT RIWAYAT =================
function lihatRiwayat(key){

let box = document.getElementById("history-"+key);

if(box.style.display==="block"){
  box.style.display="none";
  return;
}

db.ref("jajan/"+key+"/riwayatEdit").once("value",snap=>{

if(!snap.exists()){
  box.innerHTML = "Belum ada riwayat";
  box.style.display="block";
  return;
}

let html = "";

snap.forEach(c=>{
let d = c.val() || {};
let sebelum = d.sebelum || {};
let sesudah = d.sesudah || {};

html += `
<div style="border-top:1px solid #cbd5e1;padding-top:7px;margin-top:7px;line-height:1.5">
<b>${new Date(d.waktuEdit).toLocaleString("id-ID")}</b><br>
Dari: ${escText(sebelum.jenis)} - ${escText(sebelum.tempat)}<br>
Ke: ${escText(sesudah.jenis)} - ${escText(sesudah.tempat)}<br>
Item lama: ${(sebelum.items || []).map(i=>escText(i.barang)+"="+(i.jumlah ?? `M${i.masuk||0}/R${i.retur||0}`)).join(", ")}<br>
Item baru: ${(sesudah.items || []).map(i=>escText(i.barang)+"="+(i.jumlah ?? `M${i.masuk||0}/R${i.retur||0}`)).join(", ")}
</div>
`;
});

box.innerHTML = html;
box.style.display="block";

});
}


function namaHariIndonesia(t){
 const h=['Ahad','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu'];
 return h[new Date(t).getDay()];
}
function pesanSimple(d){
 return (d.items||[]).map(i=>`${i.barang} ${Number(i.jumlah||i.masuk||0)}`).join("\n");
}
function pesanLengkap(d){
 let hari=namaHariIndonesia(d.waktu);
 let tgl=new Date(d.waktu).toLocaleDateString('id-ID',{day:'numeric',month:'long',year:'numeric'});
 let isi=(d.items||[]).map(i=>`${i.barang} ${Number(i.jumlah||i.masuk||0)}`).join("\n");
 return `${d.tempat}\n\n${hari}, ${tgl}\n\nMasuk:\n\n${isi}`;
}
function copySimple(k){let d=dataLaporan[k]; navigator.clipboard.writeText(pesanSimple(d)); alert('Berhasil disalin');}
function copyFull(k){let d=dataLaporan[k]; navigator.clipboard.writeText(pesanLengkap(d)); alert('Berhasil disalin');}
function sendWA(k){let d=dataLaporan[k]; window.open('https://wa.me/?text='+encodeURIComponent(pesanSimple(d)),'_blank');}
function sendWAFull(k){let d=dataLaporan[k]; window.open('https://wa.me/?text='+encodeURIComponent(pesanLengkap(d)),'_blank');}

</script>
