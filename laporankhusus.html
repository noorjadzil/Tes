<!DOCTYPE html>

<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Laporan Khusus</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<style>
body{
font-family:Segoe UI,Arial,sans-serif;
background:#f1f5f9;
margin:0;
padding:15px;
}
.card{
background:#fff;
border-radius:16px;
padding:15px;
margin-bottom:15px;
box-shadow:0 2px 8px rgba(0,0,0,.1);
}
h2,h3{
margin:0 0 10px;
color:#1e3a8a;
}
textarea{
width:100%;
min-height:150px;
border:1px solid #ddd;
border-radius:10px;
padding:10px;
}
button{
padding:10px 15px;
border:none;
border-radius:10px;
background:#1e3a8a;
color:white;
font-weight:bold;
margin:5px;
cursor:pointer;
}
input[type=date]{
width:100%;
padding:10px;
border-radius:10px;
border:1px solid #ccc;
}
</style>

</head>
<body>

<div class="card">
<h2>Laporan Khusus</h2>

<input type="date" id="tgl">

<button onclick="loadLaporan()">Tampilkan</button> <button onclick="location.href='laporan.html'">Kembali</button>

</div>

<div id="hasil"></div>

<script>

firebase.initializeApp({
databaseURL:"https://maqshof-d5772-default-rtdb.asia-southeast1.firebasedatabase.app"
});

const db=firebase.database();

function hariIndonesia(date){
const hari=["Ahad","Senin","Selasa","Rabu","Kamis","Jumat","Sabtu"];
const bulan=["Januari","Februari","Maret","April","Mei","Juni","Juli","Agustus","September","Oktober","November","Desember"];

return `${hari[date.getDay()]}, ${date.getDate()} ${bulan[date.getMonth()]} ${date.getFullYear()}`;
}

function kategoriBarang(nama){

nama=(nama||"").toLowerCase();

if(nama.includes("mie ayam")) return "Mie Ayam";

if(
nama.includes("bakso") ||
nama.includes("terang bulan")
){
return "Bakso & Terang Bulan";
}

if(
nama.includes("es ") ||
nama.includes("jus") ||
nama.includes("snack") ||
nama.includes("jajanan 3000")
){
return "Minuman";
}

if(
nama.includes("maklor") ||
nama.includes("dimsum") ||
nama.includes("corndog") ||
nama.includes("brownies")
){
return "Maklor";
}

return "Cilok & Jajanan";
}

function copyText(id){
navigator.clipboard.writeText(
document.getElementById(id).value
);
alert("Berhasil disalin");
}

function kirimWA(id){
const text=document.getElementById(id).value;

window.open(
"https://wa.me/?text="+encodeURIComponent(text),
"_blank"
);
}

function buatCard(judul,isi,id){

return `
<div class="card">
<h3>${judul}</h3>

<textarea id="${id}">${isi}</textarea>

<br>

<button onclick="copyText('${id}')">
📋 Copy
</button>

<button onclick="kirimWA('${id}')">
📤 Kirim WA
</button>
</div>
`;

}

async function loadLaporan(){

const hasil=document.getElementById("hasil");
hasil.innerHTML="Loading...";

const tanggal=document.getElementById("tgl").value;

const snap=await db.ref("jajan").once("value");

let minuman=[];
let mie=[];
let bakso=[];
let maklor=[];
let jajanan=[];
let lengkap=[];

snap.forEach(c=>{

let d=c.val();

if(!d.waktu) return;

let t=new Date(d.waktu);

let cek=
t.getFullYear()+"-"+
String(t.getMonth()+1).padStart(2,"0")+"-"+
String(t.getDate()).padStart(2,"0");

if(cek!==tanggal) return;

let header=
`${d.tempat}
${hariIndonesia(t)}

${d.jenis} :
`;

let isi=[];

(d.items||[]).forEach(i=>{

let baris=`${i.barang} ${i.jumlah||i.masuk||0}`;

isi.push(baris);

switch(kategoriBarang(i.barang)){

case "Minuman":
minuman.push(baris);
break;

case "Mie Ayam":
mie.push(baris);
break;

case "Bakso & Terang Bulan":
bakso.push(baris);
break;

case "Maklor":
maklor.push(baris);
break;

default:
jajanan.push(baris);

}

});

lengkap.push(header+"\n"+isi.join("\n"));

});

hasil.innerHTML="";

hasil.innerHTML+=buatCard(
"🥤 Minuman",
minuman.join("\n"),
"lapMinuman"
);

hasil.innerHTML+=buatCard(
"🍜 Mie Ayam",
mie.join("\n"),
"lapMie"
);

hasil.innerHTML+=buatCard(
"🥟 Bakso & Terang Bulan",
bakso.join("\n"),
"lapBakso"
);

hasil.innerHTML+=buatCard(
"🌭 Maklor",
maklor.join("\n"),
"lapMaklor"
);

hasil.innerHTML+=buatCard(
"🍢 Cilok & Jajanan",
jajanan.join("\n"),
"lapJajanan"
);

hasil.innerHTML+=buatCard(
"📋 Laporan Lengkap",
lengkap.join("\n===================\n"),
"lapLengkap"
);

}

window.onload=()=>{

let d=new Date();

document.getElementById("tgl").value=
d.toISOString().split("T")[0];

loadLaporan();

};

</script>
</body>
</html>
