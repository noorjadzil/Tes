<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Studio Web v2</title>
<link rel="preconnect" href="https://cdnjs.cloudflare.com">
<style>
:root{--bg:#0b1220;--panel:#111827;--line:#243244;--text:#e5e7eb;--accent:#3b82f6}
*{box-sizing:border-box}html,body{height:100%;margin:0;font-family:Inter,system-ui,sans-serif;background:var(--bg);color:var(--text);overflow:hidden}
.top{height:58px;background:#111827;border-bottom:1px solid var(--line);display:flex;align-items:center;padding:0 14px;gap:10px}
.brand{font-weight:700;flex:1}
input,button{background:#1f2937;border:1px solid #334155;color:#fff;border-radius:10px;padding:9px 12px}
button{cursor:pointer}
.wrap{display:grid;grid-template-columns:260px 1fr 42%;height:calc(100% - 58px)}
.side{background:#0f172a;border-right:1px solid var(--line);overflow:auto}
.section{padding:14px}
.title{font-size:13px;color:#94a3b8;margin-bottom:10px;text-transform:uppercase}
.file{padding:10px 12px;border-radius:10px;cursor:pointer}
.file:hover{background:#1e293b}
.editorbox,.browser{height:100%;display:flex;flex-direction:column}
.tab{height:42px;background:#111827;border-bottom:1px solid var(--line);display:flex;align-items:center;padding:0 12px}
#editor{flex:1}
.browserbar{height:42px;background:#e5e7eb;color:#111;display:flex;align-items:center;padding:0 10px;gap:8px}
.dot{width:12px;height:12px;border-radius:50%;background:#ef4444}.y{background:#f59e0b}.g{background:#22c55e}
#addr{flex:1;border:1px solid #ccc;background:#fff;color:#222;padding:6px 10px;border-radius:20px}
iframe{flex:1;border:0;background:#fff}
@media(max-width:900px){.wrap{grid-template-columns:1fr}.side{display:none}}
</style>
</head>
<body>
<div class="top">
<div class="brand">Studio Web v2</div>
<input id="project" placeholder="Nama project">
<button>Save</button>
<button>Open</button>
<button>Publish</button>
</div>
<div class="wrap">
<div class="side">
<div class="section">
<div class="title">Projects</div>
<div class="file">📄 index.html</div>
<div class="file">📄 tes1</div>
<div class="file">📄 website</div>
<div class="file">＋ New Project</div>
</div>
</div>
<div class="editorbox">
<div class="tab">index.html</div>
<div id="editor"></div>
</div>
<div class="browser">
<div class="browserbar">
<div class="dot"></div><div class="dot y"></div><div class="dot g"></div>
<input id="addr" value="https://your-site/?id=tes1">
</div>
<iframe id="preview"></iframe>
</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.52.2/min/vs/loader.min.js"></script>
<script>
require.config({paths:{vs:'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.52.2/min/vs'}});
require(['vs/editor/editor.main'],function(){
 const start=`<!DOCTYPE html>
<html>
<head>
<style>
body{font-family:Arial;padding:20px}
h1{color:#2563eb}
</style>
</head>
<body>
<h1>Hello World</h1>
<p>Edit dengan Monaco Editor.</p>
</body>
</html>`;
 const ed=monaco.editor.create(document.getElementById('editor'),{
   value:start,
   language:'html',
   theme:'vs-dark',
   automaticLayout:true,
   minimap:{enabled:true},
   fontSize:14,
   roundedSelection:true,
   scrollBeyondLastLine:false
 });
 function render(){
   const doc=document.getElementById('preview').contentDocument;
   doc.open();doc.write(ed.getValue());doc.close();
 }
 ed.onDidChangeModelContent(render);
 render();
});
</script>
</body>
</html>
