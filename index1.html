<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mini HTML Editor</title>
<style>
*{box-sizing:border-box}body{margin:0;font-family:Arial;background:#202124;color:#fff}
header{display:flex;gap:8px;align-items:center;padding:10px;background:#111;flex-wrap:wrap}
input,button{padding:8px;border-radius:6px;border:1px solid #555}
input{background:#222;color:#fff}
button{cursor:pointer}
#editor{width:100%;height:45vh;background:#0d1117;color:#7CFC00;border:none;
padding:12px;font-family:Consolas,monospace;font-size:14px}
iframe{width:100%;height:45vh;border:none;background:#fff}
</style>
</head>
<body>

<header>
<b>📄 Project</b>
<input id="project" placeholder="contoh: tes.1">
<button onclick="saveProject()">💾 Save</button>
<button onclick="openProject()">📂 Open</button>
<button onclick="preview()">▶ Preview</button>
</header>

<textarea id="editor"><!DOCTYPE html>
<html>
<head>
<title>Halo</title>
<style>
body{font-family:Arial;padding:20px}
h1{color:royalblue}
</style>
</head>
<body>

<h1>Hello World</h1>
<p>Edit kode di sini.</p>

<script>
console.log("Halo");
</script>

</body>
</html></textarea>

<iframe id="view"></iframe>

<script>
const ed=document.getElementById("editor");
const view=document.getElementById("view");
const nameBox=document.getElementById("project");

function preview(){
 const d=view.contentDocument||view.contentWindow.document;
 d.open();
 d.write(ed.value);
 d.close();
}

function saveProject(){
 const name=nameBox.value.trim();
 if(!name){alert("Masukkan nama project.");return;}
 localStorage.setItem("project_"+name,ed.value);
 localStorage.setItem("last_project",name);
 alert("Project '"+name+"' berhasil disimpan.");
}

function openProject(){
 let name=nameBox.value.trim();
 if(!name){
   name=prompt("Nama project:");
   if(!name)return;
   nameBox.value=name;
 }
 const data=localStorage.getItem("project_"+name);
 if(!data){
   alert("Project tidak ditemukan.");
   return;
 }
 ed.value=data;
 preview();
}

const last=localStorage.getItem("last_project");
if(last){
 nameBox.value=last;
 const data=localStorage.getItem("project_"+last);
 if(data) ed.value=data;
}
ed.addEventListener("input",preview);
preview();
</script>

</body>
</html>
