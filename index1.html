<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mini HTML Studio Firebase</title>
<style>
body{margin:0;font-family:Arial;background:#1e1e1e;color:#fff}
header{display:flex;gap:8px;padding:10px;background:#111;flex-wrap:wrap}
input,button,select{padding:8px;border-radius:6px;border:1px solid #555;background:#222;color:#fff}
button{cursor:pointer}
#editor{width:100%;height:45vh;background:#0d1117;color:#7CFC00;border:none;padding:10px;font-family:Consolas,monospace}
iframe{width:100%;height:42vh;border:none;background:#fff}
</style>
</head>
<body>
<header>
<input id="name" placeholder="Nama project (misal: tes1)">
<button onclick="saveProject()">💾 Save</button>
<select id="list"></select>
<button onclick="loadProject()">📂 Open</button>
<button onclick="preview()">▶ Preview</button>
</header>

<textarea id="editor"><!DOCTYPE html>
<html>
<head><title>Website Saya</title></head>
<body>
<h1>Hello World</h1>
<p>Edit halaman ini.</p>
</body>
</html></textarea>

<iframe id="view"></iframe>

<script>
const DB="https://bahasa-arab-90f36-default-rtdb.asia-southeast1.firebasedatabase.app";
const editor=document.getElementById("editor");
const frame=document.getElementById("view");
const nameBox=document.getElementById("name");
const list=document.getElementById("list");

function preview(){
 const d=frame.contentDocument||frame.contentWindow.document;
 d.open();
 d.write(editor.value);
 d.close();
}

async function refreshProjects(){
 try{
   const r=await fetch(DB+"/projects.json");
   const data=await r.json();
   list.innerHTML="";
   if(!data) return;
   Object.keys(data).sort().forEach(k=>{
      const o=document.createElement("option");
      o.value=k;o.textContent=k;
      list.appendChild(o);
   });
 }catch(e){
   console.error(e);
 }
}

async function saveProject(){
 const name=nameBox.value.trim();
 if(!name){alert("Masukkan nama project.");return;}
 const body={
   code:editor.value,
   updated:new Date().toISOString()
 };
 const r=await fetch(DB+"/projects/"+encodeURIComponent(name)+".json",{
   method:"PUT",
   headers:{"Content-Type":"application/json"},
   body:JSON.stringify(body)
 });
 if(r.ok){
   alert("Project '"+name+"' tersimpan.");
   refreshProjects();
 }else{
   alert("Gagal menyimpan. Periksa Firebase Rules.");
 }
}

async function loadProject(){
 const name=list.value||nameBox.value.trim();
 if(!name)return;
 const r=await fetch(DB+"/projects/"+encodeURIComponent(name)+".json");
 const data=await r.json();
 if(!data){alert("Project tidak ditemukan.");return;}
 nameBox.value=name;
 editor.value=data.code||"";
 preview();
}

editor.addEventListener("input",preview);
preview();
refreshProjects();
</script>
</body>
</html>
