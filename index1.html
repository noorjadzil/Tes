<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mini Studio</title>
<style>
*{box-sizing:border-box}body{margin:0;font-family:system-ui;background:#0f172a;color:#fff}
.top{display:flex;gap:8px;padding:10px;background:#111827;align-items:center}
.top input,.top button{padding:8px 10px;border-radius:8px;border:1px solid #374151;background:#1f2937;color:#fff}
.layout{display:grid;grid-template-columns:260px 1fr;height:calc(100vh - 56px)}
.side{border-right:1px solid #374151;padding:10px;overflow:auto}
.main{padding:10px}
.item{padding:10px;background:#1f2937;border-radius:8px;margin-bottom:6px;cursor:pointer}
.item:hover{background:#2563eb}
textarea{width:100%;height:45%;background:#020617;color:#86efac;border:1px solid #374151;border-radius:8px;padding:10px;font-family:Consolas,monospace}
iframe{width:100%;height:45%;border:1px solid #374151;background:#fff;border-radius:8px;margin-top:10px}
#share{width:100%;margin-top:8px;padding:8px;border-radius:8px;border:1px solid #374151;background:#1f2937;color:#fff}
</style>
</head>
<body>
<script>
const DB="https://bahasa-arab-90f36-default-rtdb.asia-southeast1.firebasedatabase.app";
const id=new URLSearchParams(location.search).get("id");
if(id){
 fetch(DB+"/projects/"+encodeURIComponent(id)+".json")
 .then(r=>r.json())
 .then(d=>{
   if(!d||!d.code){document.body.innerHTML="<h2 style='font-family:sans-serif'>Project tidak ditemukan.</h2>";return;}
   document.open();document.write(d.code);document.close();
 });
}
</script>

<div id="app">
<div class="top">
<input id="name" placeholder="Nama project">
<button id="saveBtn">💾 Save</button>
<button id="previewBtn">▶ Preview</button>
<button id="copyBtn">🔗 Copy Link</button>
<button id="openBtn">🌐 Open</button>
</div>
<div class="layout">
<div class="side">
<h3>📁 Open</h3>
<div id="files"></div>
</div>
<div class="main">
<textarea id="editor"><!DOCTYPE html>
<html>
<head><title>Halo</title></head>
<body>
<h1>Hello World</h1>
<p>Edit saya...</p>
</body>
</html></textarea>
<input id="share" readonly placeholder="Link project">
<iframe id="preview"></iframe>
</div>
</div>
</div>

<script>
if(id){document.getElementById("app").style.display="none";}

if(!id){
const editor=document.getElementById("editor");
const frame=document.getElementById("preview");
const files=document.getElementById("files");
const nameInput=document.getElementById("name");
const share=document.getElementById("share");

function render(){
 const doc=frame.contentDocument;
 doc.open();doc.write(editor.value);doc.close();
}
function linkOf(n){return location.origin+location.pathname+"?id="+encodeURIComponent(n);}

async function loadFiles(){
 files.innerHTML="Memuat...";
 try{
  const res=await fetch(DB+"/projects.json");
  const data=await res.json();
  files.innerHTML="";
  if(!data){files.innerHTML="<i>Belum ada project</i>";return;}
  Object.keys(data).sort().forEach(k=>{
    const d=document.createElement("div");
    d.className="item";
    d.textContent=k;
    d.onclick=async()=>{
      const r=await fetch(DB+"/projects/"+encodeURIComponent(k)+".json");
      const p=await r.json();
      if(!p)return;
      nameInput.value=k;
      editor.value=p.code||"";
      share.value=linkOf(k);
      render();
    };
    files.appendChild(d);
  });
 }catch(e){
  files.innerHTML="<b>Gagal memuat.</b>";
 }
}

document.getElementById("saveBtn").onclick=async()=>{
 const n=nameInput.value.trim();
 if(!n){alert("Masukkan nama project.");return;}
 const res=await fetch(DB+"/projects/"+encodeURIComponent(n)+".json",{
   method:"PUT",
   headers:{"Content-Type":"application/json"},
   body:JSON.stringify({code:editor.value,updated:Date.now()})
 });
 if(res.ok){
   share.value=linkOf(n);
   await loadFiles();
   alert("Berhasil disimpan.");
 }else alert("Gagal menyimpan. Periksa Firebase Rules.");
};

document.getElementById("previewBtn").onclick=render;
document.getElementById("copyBtn").onclick=()=>{if(!share.value)return; navigator.clipboard.writeText(share.value); alert("Link disalin.");};
document.getElementById("openBtn").onclick=()=>{if(share.value) window.open(share.value,"_blank");};

editor.addEventListener("input",render);
render();
loadFiles();
}
</script>
</body>
</html>
