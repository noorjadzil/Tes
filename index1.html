<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LiveCode Editor - Single File</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#1e1e1e;color:#fff}
header{background:#111;padding:10px 15px;display:flex;gap:10px;align-items:center}
button{padding:8px 14px;cursor:pointer}
.container{display:grid;grid-template-columns:1fr 1fr;height:calc(100vh - 52px)}
.left{padding:10px;overflow:auto}
.right{padding:10px;background:#2d2d2d}
textarea{width:100%;height:28%;margin-bottom:10px;background:#0d1117;color:#7CFC00;
border:1px solid #555;padding:10px;font-family:monospace;box-sizing:border-box}
iframe{width:100%;height:95%;background:#fff;border:none}
</style>
</head>
<body>

<header>
<h2 style="margin:0;flex:1;">💻 LiveCode Editor</h2>
<button onclick="run()">▶ Run</button>
<button onclick="save()">💾 Save</button>
</header>

<div class="container">
<div class="left">
<h3>HTML</h3>
<textarea id="html"><h1>Hello World</h1><p>Edit HTML di sini.</p></textarea>

<h3>CSS</h3>
<textarea id="css">body{font-family:Arial;padding:20px;}h1{color:#1976d2;}</textarea>

<h3>JavaScript</h3>
<textarea id="js">console.log("Halo");</textarea>
</div>

<div class="right">
<h3>Preview</h3>
<iframe id="preview"></iframe>
</div>
</div>

<script>
const html=document.getElementById("html");
const css=document.getElementById("css");
const js=document.getElementById("js");
const frame=document.getElementById("preview");

function run(){
 const doc=frame.contentDocument||frame.contentWindow.document;
 doc.open();
 doc.write(`<!DOCTYPE html><html><head><style>${css.value}</style></head><body>${html.value}<script>${js.value}<\/script></body></html>`);
 doc.close();
}

function save(){
 localStorage.setItem("live_html",html.value);
 localStorage.setItem("live_css",css.value);
 localStorage.setItem("live_js",js.value);
 alert("Tersimpan di browser.");
}

html.value=localStorage.getItem("live_html")||html.value;
css.value=localStorage.getItem("live_css")||css.value;
js.value=localStorage.getItem("live_js")||js.value;

html.oninput=css.oninput=js.oninput=run;
run();
</script>

</body>
</html>
