<style>
body{

}

.card{

h2{

.tab-btn{

.laporan-header{

margin-top:10px;
padding:12px;
border:none;

color:white;

}

.share-note{

color:#64748b;

.detail-khusus-title{
margin-top:16px;
font-weight:900;
color:#1e3a8a;
font-size:15px;
}

font-size:12px;
color:#64748b;
font-weight:700;
line-height:1.4;
margin:5px 0 8px;
}

background:#f8fafc;
font-weight:900;
}

img{

border-radius:10px;

<body>

<div class="container">
<div class="card">

<h2>Laporan Jajan</h2>

<button onclick="kembali()" style="

border:none;
border-radius:10px;
background:#64748b;

">

<div style="display:flex;margin-bottom:10px;">

  <button id="btnRekap" class="tab-btn nonactive" onclick="showTab('rekap')">Rekap</button>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
// =================== NAV ===================
function kembali(){
  window.location.href = "index.html";
}

// =================== TAB ===================
function showTab(tab){
  const laporan = document.getElementById("tabLaporan");
  const rekap = document.getElementById("tabRekap");
  const bulanan = document.getElementById("tabBulanan");

  const btnLaporan = document.getElementById("btnLaporan");
  const btnRekap = document.getElementById("btnRekap");
  const btnBulanan = document.getElementById("btnBulanan");
  const btnModeHapus = document.getElementById("btnModeHapus");
  const deleteToolbar = document.getElementById("deleteToolbar");

  if(modeHapusAktif && tab !== "laporan") toggleModeHapus();

  laporan.style.display = tab === "laporan" ? "block" : "none";
  rekap.style.display = tab === "rekap" ? "block" : "none";
  bulanan.style.display = tab === "bulanan" ? "block" : "none";

  btnLaporan.className = tab === "laporan" ? "tab-btn active" : "tab-btn nonactive";
  btnRekap.className = tab === "rekap" ? "tab-btn active" : "tab-btn nonactive";
  btnBulanan.className = tab === "bulanan" ? "tab-btn active" : "tab-btn nonactive";

  if(btnModeHapus) btnModeHapus.style.display = tab === "laporan" ? "block" : "none";
  if(deleteToolbar && tab !== "laporan") deleteToolbar.classList.remove("active");
}

// =================== FIREBASE ===================
const firebaseConfig={
databaseURL:"https://maqshof-d5772-default-rtdb.asia-southeast1.firebasedatabase.app"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.database();

let modeHapusAktif = false;
let selectedHapus = new Set();

// =================== FORMAT ===================
function formatTanggal(waktu){
let date = new Date(waktu);

let hari = date.toLocaleDateString("id-ID",{weekday:"long"});
let tanggal = date.toLocaleDateString("id-ID",{day:"numeric", month:"long", year:"numeric"});
let jam = date.toLocaleTimeString("id-ID",{hour:"2-digit",minute:"2-digit"});

return `${hari}, ${tanggal} - ${jam}`;
}

function formatTanggalHari(waktu){
let date = new Date(waktu);

let hari = date.toLocaleDateString("id-ID",{weekday:"long"});
let tanggal = date.toLocaleDateString("id-ID",{day:"numeric", month:"long", year:"numeric"});

return `${hari}, ${tanggal}`;
}

// =================== LAPORAN ===================
function loadLaporan(){

let list=document.getElementById("listLaporan");
list.innerHTML="Loading...";

db.ref("jajan").limitToLast(50).once("value",snap=>{

list.innerHTML="";

if(!snap.val()){
list.innerHTML="Belum ada data";
return;
}

// ambil data + key
let arr=[];

snap.forEach(c=>{
  let d = c.val();
  d.key = c.key;
  arr.push(d);
});

arr.reverse();

arr.forEach(d=>{

let items = (d.items || [])
.map(i=>{
  if(i.masuk !== undefined || i.retur !== undefined){
    return `• ${i.barang} - Masuk: ${Number(i.masuk||0)}, Retur: ${Number(i.retur||0)}`;
  }
  return `• ${i.barang} (${Number(i.jumlah||0)})`;
})
.join("<br>");

let div=document.createElement("div");
div.className="laporan-card";

div.innerHTML=`
<label class="delete-check-wrap" id="checkWrap-${d.key}">
  <input type="checkbox" class="hapus-check" data-key="${d.key}" onchange="togglePilihHapus('${d.key}', this.checked)">
  Pilih untuk dihapus
</label>
<div class="laporan-header">
${d.jenis} - ${d.tempat}

${d.riwayatEdit ? '<span style="color:red;font-size:12px"> (edited)</span>' : ''}

<span onclick="toggleEdit('${d.key}')" style="cursor:pointer;float:right">✏️</span>
</div>

<div class="laporan-tanggal" id="tgl-${d.key}">
${formatTanggal(d.waktu)}
</div>

<div class="laporan-items" id="items-${d.key}">
${items}
</div>

<div id="edit-${d.key}" style="display:none;margin-top:10px"></div>

${d.catatan ? `
<div style="margin-top:8px;font-weight:700;color:#dc2626">
Catatan: ${d.catatan}
</div>
` : ""}

${d.foto ? `<img src="${d.foto}">` : ""}
`;

list.appendChild(div);
if(modeHapusAktif){
  let wrap = document.getElementById("checkWrap-"+d.key);
  let cb = div.querySelector('.hapus-check');
  if(wrap) wrap.style.display = "block";
  if(cb) cb.checked = selectedHapus.has(d.key);
  if(selectedHapus.has(d.key)) div.classList.add("delete-selected");
}

});

});
}


// =================== HITUNG REKAP FLEKSIBEL ===================
function angka(v){
  return Number(v || 0);
}

function tambahKeGrup(grup, d, hargaMap){
  if(!d.waktu) return;

  let dateObj = new Date(d.waktu);
  if(isNaN(dateObj)) return;

  let key = dateObj.toLocaleDateString("id-ID", {year:"numeric", month:"2-digit", day:"2-digit"});
  let label = formatTanggalHari(dateObj);

  if(!grup[key]){
    grup[key]={label, tanggalObj:dateObj, masukIkhwan:0, masukAkhwat:0, sisaIkhwan:0, sisaAkhwat:0, totalUang:0};
  }

  let jenis = (d.jenis || "").toLowerCase();
  let tempat = (d.tempat || "").toLowerCase();

  (d.items || []).forEach(i=>{
    // Item khusus punya rincian bulanan sendiri, supaya tidak tercampur dengan rekap Cilok/Tahu/Batagor lama.
    if(isItemKhusus(i)) return;

    let nama = (i.barang || "").toLowerCase().trim();
    let harga = hargaMap[nama] || 0;

    // Format baru: dalam 1 item ada masuk dan retur/sisa
    if(i.masuk !== undefined || i.retur !== undefined){
      let masuk = angka(i.masuk);
      let retur = angka(i.retur);

      if(tempat.includes("ikhwan")){
        grup[key].masukIkhwan += masuk;
        grup[key].sisaIkhwan += retur;
      }else if(tempat.includes("akhwat") || tempat.includes("akhawat")){
        grup[key].masukAkhwat += masuk;
        grup[key].sisaAkhwat += retur;
      }else{
        grup[key].masukAkhwat += masuk;
        grup[key].sisaAkhwat += retur;
      }

      grup[key].totalUang += Math.max(masuk - retur, 0) * harga;
      return;
    }

    // Format lama: jenis transaksi Masuk / Sisa, item hanya jumlah
    let jumlah = angka(i.jumlah);

    if(jenis.includes("masuk") && tempat.includes("ikhwan")){
      grup[key].masukIkhwan += jumlah;
      grup[key].totalUang += jumlah * harga;
    }
    if(jenis.includes("masuk") && (tempat.includes("akhwat") || tempat.includes("akhawat"))){
      grup[key].masukAkhwat += jumlah;
      grup[key].totalUang += jumlah * harga;
    }
    if((jenis.includes("sisa") || jenis.includes("retur")) && tempat.includes("ikhwan")){
      grup[key].sisaIkhwan += jumlah;
    }
    if((jenis.includes("sisa") || jenis.includes("retur")) && (tempat.includes("akhwat") || tempat.includes("akhawat"))){
      grup[key].sisaAkhwat += jumlah;
    }
  });
}

function hitungTerjual(g){
  return Math.max((g.masukIkhwan + g.masukAkhwat) - (g.sisaIkhwan + g.sisaAkhwat), 0);
}


// =================== ITEM KHUSUS BULANAN ===================
// Bagian ini hanya untuk item khusus seperti Es Teh, Terang Bulan, Mie Ayam, Bakso, Aneka Snack, Jajanan 3000.
// Cilok/Tahu/Batagor dan item lama tetap dihitung seperti sebelumnya.
const NAMA_ITEM_KHUSUS = [
  "mie ayam",
  "bakso",
  "terang bulan",
  "es teh",
  "es jeruk",
  "es blewah",
  "es coklat",
  "jus alpukat",
  "es sari kedelai",
  "aneka snack",
  "jajanan 3000"
];

const KATEGORI_ITEM_KHUSUS = [
  "mie ayam",
  "bakso & terang bulan",
  "bakso terang bulan",
  "es & snack",
  "es snack",
  "es, snack & jajanan 3000",
  "es snack jajanan 3000"
];

function normalText(v){
  return String(v || "").toLowerCase().trim();
}

function isItemKhusus(i){
  let nama = normalText(i.barang);
  let kategori = normalText(i.kategori);

  if(kategori && KATEGORI_ITEM_KHUSUS.some(k => kategori.includes(k))) return true;
  return NAMA_ITEM_KHUSUS.some(n => nama === n || nama.includes(n));
}

function ambilHargaItem(i, hargaMap){
  let nama = normalText(i.barang);
  return Number(i.harga || hargaMap[nama] || 0);
}

function buatHTMLRekapBulananKhusus(dataBulan, hargaMap){
  let grup = {};
  let totalPerItem = {};

  dataBulan.forEach(d=>{
    if(!d.waktu) return;
    let dateObj = new Date(d.waktu);
    if(isNaN(dateObj)) return;

    let tanggalKey = dateObj.toLocaleDateString("id-ID", {year:"numeric", month:"2-digit", day:"2-digit"});
    let tanggalLabel = formatTanggalHari(dateObj);
    let jenis = normalText(d.jenis);

    (d.items || []).forEach(i=>{
      if(!isItemKhusus(i)) return;

      let nama = String(i.barang || "").trim();
      if(!nama) return;

      let masuk = 0;
      let sisa = 0;

      // Mendukung format baru: {barang, masuk, retur}
      if(i.masuk !== undefined || i.retur !== undefined){
        masuk = angka(i.masuk);
        sisa = angka(i.retur);
      }else{
        // Mendukung format lama: transaksi punya jenis Masuk / Sisa, item punya jumlah
        let jumlah = angka(i.jumlah);
        if(jenis.includes("masuk")) masuk = jumlah;
        if(jenis.includes("sisa") || jenis.includes("retur")) sisa = jumlah;
      }

      let harga = ambilHargaItem(i, hargaMap);
      let key = tanggalKey + "||" + nama;

      if(!grup[key]){
        grup[key] = {tanggalKey, tanggalLabel, tanggalObj:dateObj, nama, masuk:0, sisa:0, harga: harga};
      }

      grup[key].masuk += masuk;
      grup[key].sisa += sisa;
      if(harga) grup[key].harga = harga;

      if(!totalPerItem[nama]) totalPerItem[nama] = {nama, masuk:0, sisa:0, harga:harga};
      totalPerItem[nama].masuk += masuk;
      totalPerItem[nama].sisa += sisa;
      if(harga) totalPerItem[nama].harga = harga;
    });
  });

  let keys = Object.keys(grup).sort((a,b)=>{
    let A = grup[a], B = grup[b];
    return A.tanggalObj - B.tanggalObj || A.nama.localeCompare(B.nama);
  });

  if(!keys.length){
    return `
      <div class="detail-khusus-title">Rincian Bulanan Item Khusus</div>
      <div class="detail-note">Belum ada data item khusus pada bulan ini.</div>`;
  }

  let rows = keys.map(key=>{
    let g = grup[key];
    let terjual = Math.max(g.masuk - g.sisa, 0);
    let total = terjual * Number(g.harga || 0);
    return `
      <tr>
        <td>${g.tanggalLabel}</td>
        <td>${escText(g.nama)}</td>
        <td>${g.masuk}</td>
        <td>${g.sisa}</td>
        <td>${terjual}</td>
        <td>Rp ${Number(g.harga||0).toLocaleString("id-ID")}</td>
        <td>Rp ${total.toLocaleString("id-ID")}</td>
      </tr>`;
  }).join("");

  let totalRows = Object.values(totalPerItem).sort((a,b)=>a.nama.localeCompare(b.nama)).map(g=>{
    let terjual = Math.max(g.masuk - g.sisa, 0);
    let total = terjual * Number(g.harga || 0);
    return `
      <tr class="item-khusus-total">
        <td colspan="2">TOTAL ${escText(g.nama)}</td>
        <td>${g.masuk}</td>
        <td>${g.sisa}</td>
        <td>${terjual}</td>
        <td>Rp ${Number(g.harga||0).toLocaleString("id-ID")}</td>
        <td>Rp ${total.toLocaleString("id-ID")}</td>
      </tr>`;
  }).join("");

  return `
    <div class="detail-khusus-title">Rincian Bulanan Item Khusus</div>
    <div class="detail-note">
      Hitungan per tanggal: Masuk - Sisa = Terjual, lalu Terjual × Harga = Total.
      Contoh: Es Teh masuk 10, sisa 1, harga 3.700 → 9 × 3.700 = 33.300.
    </div>
    <div class="rekap-table-wrap">
      <table class="rekap-table">
        <thead>
          <tr>
            <th>Tanggal</th>
            <th>Item</th>
            <th>Masuk</th>
            <th>Sisa</th>
            <th>Terjual</th>
            <th>Harga</th>
            <th>Total</th>
          </tr>
        </thead>
        <tbody>
          ${rows}
          ${totalRows}
        </tbody>
      </table>
    </div>`;
}

function ambilHargaDanJajan(callback){
  db.ref("items").once("value",snapItem=>{
    let hargaMap = {};
    if(snapItem.exists()){
      snapItem.forEach(c=>{
        let d = c.val() || {};
        let nama = (d.nama || d.barang || d.name || "").toLowerCase().trim();
        hargaMap[nama] = Number(d.harga || 0);
      });
    }

    db.ref("jajan").once("value",snap=>{
      callback(hargaMap, snap);
    });
  });
}

// =================== REKAP (FINAL FIX) ===================
function loadRekap(){

let container=document.getElementById("rekapHarian");
container.innerHTML="Loading...";

// ambil harga item
db.ref("items").once("value",snapItem=>{

let hargaMap = {};

if(snapItem.exists()){
snapItem.forEach(c=>{
let d = c.val();
let nama = (d.nama || "").toLowerCase().trim();
hargaMap[nama] = Number(d.harga || 0);
});
}

// ambil data jajan
db.ref("jajan").once("value",snap=>{

if(!snap.exists()){
container.innerHTML="Belum ada data";
return;
}

let data=Object.values(snap.val());
let grup={};

data.forEach(d=>{

if(!d.waktu) return;

let dateObj = new Date(d.waktu);
if(isNaN(dateObj)) return;

let key = dateObj.toLocaleDateString("id-ID", {
  year: "numeric",
  month: "2-digit",
  day: "2-digit"
});

let label = formatTanggalHari(dateObj);

if(!grup[key]){
grup[key]={
label: label,
masukIkhwan:0,
masukAkhwat:0,
sisaIkhwan:0,
sisaAkhwat:0,
totalUang:0
};
}

let jenis = (d.jenis || "").toLowerCase();
let tempat = (d.tempat || "").toLowerCase();

// loop item
(d.items || []).forEach(i=>{

let nama = (i.barang || "").toLowerCase().trim();
let jumlah = Number(i.jumlah || 0);
let harga = hargaMap[nama] || 0;

let subtotal = jumlah * harga;

// masuk
if(jenis.includes("masuk") && tempat.includes("ikhwan")){
  grup[key].masukIkhwan += jumlah;
  grup[key].totalUang += subtotal;
}

if(jenis.includes("masuk") && tempat.includes("akhwat")){
  grup[key].masukAkhwat += jumlah;
  grup[key].totalUang += subtotal;
}

// sisa
if(jenis.includes("sisa") && tempat.includes("ikhwan")){
  grup[key].sisaIkhwan += jumlah;
}

if(jenis.includes("sisa") && tempat.includes("akhwat")){

function loadRekapBulanan(){
  let container = document.getElementById("rekapBulanan");
  if(!container) return;
  container.innerHTML = "Loading...";

  ambilHargaDanJajan((hargaMap, snap)=>{
    if(!snap.exists()){
      container.innerHTML = "Belum ada data";
      return;
    }

    let semuaData = Object.values(snap.val()).filter(d => d && d.waktu && !isNaN(new Date(d.waktu)));

    if(!semuaData.length){
      container.innerHTML = "Belum ada data";
      return;
    }

    let now = new Date();
    let bulanAktif = String(now.getMonth()+1).padStart(2,"0");
    let tahunAktif = String(now.getFullYear());

    // Kalau bulan sekarang belum ada data, otomatis pilih bulan data terbaru
    let sortedData = [...semuaData].sort((a,b)=> new Date(b.waktu) - new Date(a.waktu));
    let adaBulanIni = semuaData.some(d=>{
      let x = new Date(d.waktu);
      return String(x.getMonth()+1).padStart(2,"0") === bulanAktif && String(x.getFullYear()) === tahunAktif;
    });
    if(!adaBulanIni){
      let latest = new Date(sortedData[0].waktu);
      bulanAktif = String(latest.getMonth()+1).padStart(2,"0");
      tahunAktif = String(latest.getFullYear());
    }

    renderRekapBulanan(semuaData, hargaMap, bulanAktif, tahunAktif);
  });
}

  let grup = {};

          ${namaBulan.map((b,i)=>`<option value="${String(i+1).padStart(2,"0")}" ${String(i+1).padStart(2,"0")===bulanAktif ? "selected" : ""}>${b}</option>`).join("")}
        </select>
        <select id="tahunRekap" onchange="renderRekapBulananCache()">
          ${tahunList.map(t=>`<option value="${t}" ${t===tahunAktif ? "selected" : ""}>${t}</option>`).join("")}

      <div class="rekap-table-wrap">

function buatNamaFileAman(text){
  return String(text || "rekap-bulanan")
    .toLowerCase()
    .replace(/[^a-z0-9]+/g,"-")
    .replace(/(^-|-$)/g,"") + ".png";
}

function canvasRoundRect(ctx, x, y, w, h, r){
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y);
  ctx.quadraticCurveTo(x+w, y, x+w, y+r);
  ctx.lineTo(x+w, y+h-r);
  ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  ctx.lineTo(x+r, y+h);
  ctx.quadraticCurveTo(x, y+h, x, y+h-r);
  ctx.lineTo(x, y+r);
  ctx.quadraticCurveTo(x, y, x+r, y);
  ctx.closePath();
}

function wrapTextCanvas(ctx, text, x, y, maxWidth, lineHeight){
  let words = String(text || "").split(" ");
  let line = "";
  let lines = [];

  words.forEach(word=>{
    let test = line ? line + " " + word : word;
    if(ctx.measureText(test).width > maxWidth && line){
      lines.push(line);
      line = word;
    }else{
      line = test;
    }
  });

  if(line) lines.push(line);
  lines.forEach((ln, i)=>ctx.fillText(ln, x, y + (i * lineHeight)));
  return lines.length;
}

function gambarRekapBulananBlob(){
  return new Promise((resolve, reject)=>{
    let data = window.__rekapBulananLast;
    if(!data){
      reject(new Error("Data bulanan belum siap."));
      return;
    }

    let keys = Object.keys(data.grup || {}).sort((a,b)=> data.grup[a].tanggalObj - data.grup[b].tanggalObj);
    let rowCount = Math.max(keys.length, 1);
    let width = 1200;
    let headerH = 145;
    let rowH = 52;
    let totalH = 62;
    let summaryH = 105;
    let footerH = 45;
    let height = headerH + rowH + (rowCount * rowH) + totalH + summaryH + footerH;

    let canvas = document.createElement("canvas");
    canvas.width = width;
    canvas.height = height;
    let ctx = canvas.getContext("2d");

    // background
    ctx.fillStyle = "#f8fafc";
    ctx.fillRect(0,0,width,height);

    // top header
    ctx.fillStyle = "#1e3a8a";
    ctx.fillRect(0,0,width,120);
    ctx.fillStyle = "white";
    ctx.font = "bold 42px Segoe UI, Arial";
    ctx.fillText(data.judul, 40, 55);
    ctx.font = "bold 24px Segoe UI, Arial";
    ctx.fillText("Laporan Jajan", 40, 92);

    // date generated
    ctx.textAlign = "right";
    ctx.font = "20px Segoe UI, Arial";
    ctx.fillText("Dibuat: " + new Date().toLocaleString("id-ID"), width - 40, 70);
    ctx.textAlign = "left";

    // table card
    let tableX = 30;
    let tableY = 145;
    let tableW = width - 60;
    let cols = [260, 140, 145, 140, 145, 120, 190];
    let headers = ["Tanggal", "Masuk Ikhwan", "Masuk Akhwat", "Sisa Ikhwan", "Sisa Akhwat", "Terjual", "Total Uang"];

    ctx.fillStyle = "white";
    canvasRoundRect(ctx, tableX, tableY, tableW, rowH + rowCount*rowH + totalH, 18);
    ctx.fill();

    // table header
    ctx.fillStyle = "#1e3a8a";
    canvasRoundRect(ctx, tableX, tableY, tableW, rowH, 18);
    ctx.fill();
    ctx.fillRect(tableX, tableY + 25, tableW, rowH - 25);

    let x = tableX;
    ctx.font = "bold 18px Segoe UI, Arial";
    ctx.fillStyle = "white";
    headers.forEach((h, idx)=>{
      ctx.textAlign = idx === 0 ? "left" : "center";
      let tx = idx === 0 ? x + 16 : x + cols[idx]/2;
      ctx.fillText(h, tx, tableY + 34);
      x += cols[idx];
    });

    // rows
    let y = tableY + rowH;
    ctx.font = "bold 18px Segoe UI, Arial";
    ctx.textBaseline = "middle";

    if(!keys.length){
      ctx.fillStyle = "#64748b";
      ctx.textAlign = "center";
      ctx.fillText("Tidak ada data pada bulan ini", width/2, y + rowH/2);
      y += rowH;
    }else{
      keys.forEach((key, rowIdx)=>{
        let g = data.grup[key];
        let terjual = hitungTerjual(g);
        let vals = [g.label, g.masukIkhwan, g.masukAkhwat, g.sisaIkhwan, g.sisaAkhwat, terjual, "Rp " + g.totalUang.toLocaleString("id-ID")];

        ctx.fillStyle = rowIdx % 2 === 0 ? "#ffffff" : "#f1f5f9";
        ctx.fillRect(tableX, y, tableW, rowH);

        let cx = tableX;
        vals.forEach((v, idx)=>{
          ctx.fillStyle = idx === 0 ? "#1e3a8a" : "#0f172a";
          ctx.textAlign = idx === 0 ? "left" : "center";
          let tx = idx === 0 ? cx + 16 : cx + cols[idx]/2;
          ctx.fillText(String(v), tx, y + rowH/2);
          cx += cols[idx];
        });

        ctx.strokeStyle = "#e2e8f0";
        ctx.beginPath();
        ctx.moveTo(tableX, y + rowH);
        ctx.lineTo(tableX + tableW, y + rowH);
        ctx.stroke();
        y += rowH;
      });
    }

    // total row
    let t = data.total || {};
    let totalVals = ["TOTAL", t.masukIkhwan||0, t.masukAkhwat||0, t.sisaIkhwan||0, t.sisaAkhwat||0, data.totalTerjual||0, "Rp " + Number(t.totalUang||0).toLocaleString("id-ID")];
    ctx.fillStyle = "#dbeafe";
    ctx.fillRect(tableX, y, tableW, totalH);
    ctx.font = "bold 20px Segoe UI, Arial";
    let cx = tableX;
    totalVals.forEach((v, idx)=>{
      ctx.fillStyle = idx === 0 ? "#1e3a8a" : "#0f172a";
      ctx.textAlign = idx === 0 ? "left" : "center";
      let tx = idx === 0 ? cx + 16 : cx + cols[idx]/2;
      ctx.fillText(String(v), tx, y + totalH/2);
      cx += cols[idx];
    });

    // summary boxes
    y += totalH + 28;
    let boxW = (tableW - 20) / 2;
    let boxH = 78;
    [["Total Terjual", String(data.totalTerjual || 0)], ["Total Uang", "Rp " + Number((data.total||{}).totalUang || 0).toLocaleString("id-ID")]].forEach((item, idx)=>{
      let bx = tableX + (idx * (boxW + 20));
      ctx.fillStyle = "#eff6ff";
      canvasRoundRect(ctx, bx, y, boxW, boxH, 16);
      ctx.fill();
      ctx.strokeStyle = "#bfdbfe";
      ctx.stroke();
      ctx.fillStyle = "#1e3a8a";
      ctx.textAlign = "left";
      ctx.font = "bold 18px Segoe UI, Arial";
      ctx.fillText(item[0], bx + 22, y + 27);
      ctx.font = "bold 30px Segoe UI, Arial";
      ctx.fillText(item[1], bx + 22, y + 58);
    });

    // footer
    ctx.fillStyle = "#64748b";
    ctx.font = "16px Segoe UI, Arial";
    ctx.textAlign = "center";
    ctx.fillText("Gambar ini dibuat otomatis dari aplikasi Laporan Jajan", width/2, height - 24);

    canvas.toBlob(blob=>{
      if(!blob){
        reject(new Error("Gagal membuat gambar."));
        return;
      }
      resolve(blob);
    }, "image/png", 0.95);
  });
}

async function kirimGambarRekapBulanan(){
  let btn = document.querySelector(".share-bulanan-btn");
  let oldText = btn ? btn.innerText : "";
  try{
    if(btn){
      btn.disabled = true;
      btn.innerText = "⏳ Membuat gambar...";
    }

    let data = window.__rekapBulananLast;
    if(!data){
      alert("Data bulanan belum siap. Coba buka tab Bulanan lagi.");
      return;
    }

    let blob = await gambarRekapBulananBlob();
    let filename = buatNamaFileAman(data.judul);
    let file = new File([blob], filename, {type:"image/png"});
    let pesan = data.judul + "\nTotal Terjual: " + (data.totalTerjual || 0) + "\nTotal Uang: Rp " + Number((data.total||{}).totalUang || 0).toLocaleString("id-ID");

    // Cara terbaik di HP: Web Share API bisa membuka WhatsApp dengan gambar terlampir.
    if(navigator.canShare && navigator.canShare({files:[file]}) && navigator.share){
      await navigator.share({
        title: data.judul,
        text: pesan,
        files: [file]
      });
      return;
    }

    // Fallback: download gambar dulu, lalu buka WhatsApp berisi pesan.
    let url = URL.createObjectURL(blob);
    let a = document.createElement("a");
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(()=>URL.revokeObjectURL(url), 3000);

    let waUrl = "https://wa.me/?text=" + encodeURIComponent(pesan + "\n\nGambar rekap sudah ter-download. Lampirkan gambar PNG tersebut di WhatsApp.");
    window.open(waUrl, "_blank");
  }catch(err){
    alert("Gagal kirim gambar: " + err.message);
  }finally{
    if(btn){
      btn.disabled = false;
      btn.innerText = oldText || "📷 Kirim Gambar Bulanan ke WA";
    }
  }
}

function toggleModeHapus(){
  modeHapusAktif = !modeHapusAktif;

  const toolbar = document.getElementById("deleteToolbar");
  const btn = document.getElementById("btnModeHapus");

  if(modeHapusAktif){
    toolbar.classList.add("active");
    btn.innerText = "❌ Tutup Menu Hapus";
    btn.style.background = "#64748b";
  }else{
    toolbar.classList.remove("active");
    btn.innerText = "🗑️ Menu Hapus";
    btn.style.background = "#991b1b";
    selectedHapus.clear();
  }

  document.querySelectorAll(".delete-check-wrap").forEach(el=>{
    el.style.display = modeHapusAktif ? "block" : "none";
  });

  document.querySelectorAll(".hapus-check").forEach(cb=>{
    cb.checked = modeHapusAktif && selectedHapus.has(cb.dataset.key);
  });

  document.querySelectorAll(".laporan-card").forEach(card=>card.classList.remove("delete-selected"));
  updateJumlahDipilih();
}

function togglePilihHapus(key, checked){
  if(checked){
    selectedHapus.add(key);
  }else{
    selectedHapus.delete(key);
  }

  let wrap = document.getElementById("checkWrap-"+key);
  let card = wrap ? wrap.closest(".laporan-card") : null;
  if(card){
    card.classList.toggle("delete-selected", checked);
  }

  updateJumlahDipilih();
}

function pilihSemuaHapus(){
  if(!modeHapusAktif) return;

  document.querySelectorAll(".hapus-check").forEach(cb=>{
    cb.checked = true;
    selectedHapus.add(cb.dataset.key);
    let card = cb.closest(".laporan-card");
    if(card) card.classList.add("delete-selected");
  });

  updateJumlahDipilih();
}

function batalkanSemuaHapus(){
  selectedHapus.clear();

  document.querySelectorAll(".hapus-check").forEach(cb=>{
    cb.checked = false;
    let card = cb.closest(".laporan-card");
    if(card) card.classList.remove("delete-selected");
  });

  updateJumlahDipilih();
}

function updateJumlahDipilih(){
  let el = document.getElementById("jumlahDipilih");
  if(el) el.innerText = selectedHapus.size;
}

function hapusYangDipilih(){
  let keys = Array.from(selectedHapus);

  if(keys.length === 0){
    alert("Belum ada transaksi yang dipilih.");
    return;
  }

  let yakin = confirm("Yakin hapus " + keys.length + " transaksi? Data yang dihapus tidak bisa dikembalikan.");
  if(!yakin) return;

  let updates = {};
  keys.forEach(key=>{
    updates["jajan/"+key] = null;
  });

  db.ref().update(updates).then(()=>{
    alert("Berhasil menghapus " + keys.length + " transaksi.");
    selectedHapus.clear();
    modeHapusAktif = false;

    document.getElementById("deleteToolbar").classList.remove("active");
    let btn = document.getElementById("btnModeHapus");
    btn.innerText = "🗑️ Menu Hapus";
    btn.style.background = "#991b1b";

    loadLaporan();
    loadRekap();
    loadRekapBulanan();
  }).catch(err=>{
    alert("Gagal menghapus: " + err.message);
  });
}

function escText(v){
  return String(v ?? "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

function toLocalDatetime(waktu){
  let dateObj = new Date(waktu || Date.now());
  if(isNaN(dateObj)) dateObj = new Date();

  return dateObj.getFullYear() + "-" +
  String(dateObj.getMonth()+1).padStart(2,"0") + "-" +
  String(dateObj.getDate()).padStart(2,"0") + "T" +
  String(dateObj.getHours()).padStart(2,"0") + ":" +
  String(dateObj.getMinutes()).padStart(2,"0");
}


let masterItemsEdit = [];

function loadMasterItemsEdit(){
  if(masterItemsEdit.length) return Promise.resolve(masterItemsEdit);

  return db.ref("items").once("value").then(snap=>{
    let arr = [];
    if(snap.exists()){
      snap.forEach(c=>{
        let d = c.val() || {};
        let nama = d.nama || d.barang || d.name || "";
        if(nama){
          arr.push({
            nama: String(nama).trim(),
            urutan: Number(d.urutan || d.order || 9999)
          });
        }
      });
    }

    arr.sort((a,b)=> a.urutan - b.urutan || a.nama.localeCompare(b.nama));
    masterItemsEdit = arr;
    return masterItemsEdit;
  });
}

function itemSelectHTML(selectedBarang){
  let selected = String(selectedBarang || "").trim();
  let found = masterItemsEdit.some(x => x.nama.toLowerCase() === selected.toLowerCase());

  let html = `<select data-field="barang" style="width:100%;padding:8px;border:1px solid #cbd5e1;border-radius:8px;margin-bottom:6px">`;

  if(!selected){
    html += `<option value="" selected>-- Pilih item --</option>`;
  }else if(!found){
    html += `<option value="" selected>⚠️ Pilih ulang: ${escText(selected)}</option>`;
  }else{
    html += `<option value="">-- Pilih item --</option>`;
  }

  masterItemsEdit.forEach(x=>{
    let isSel = x.nama.toLowerCase() === selected.toLowerCase() ? "selected" : "";
    html += `<option value="${escText(x.nama)}" ${isSel}>${escText(x.nama)}</option>`;
  });

  html += `</select>`;
  return html;
}

function itemMode(items){
  return (items || []).some(i => i.masuk !== undefined || i.retur !== undefined) ? "masukRetur" : "jumlah";
}

let jenis = escText(d.jenis || "Masuk");
let tempat = escText(d.tempat || "Akhwat");
let catatan = escText(d.catatan || "");
let local = toLocalDatetime(d.waktu);

let itemsHTML = (d.items || []).map((i,idx)=>rowItemHTML(key, idx, i, mode)).join("");

box.innerHTML = `
<div style="background:#f8fafc;padding:12px;border-radius:14px;border:1px solid #e2e8f0">

<b style="color:#1e3a8a;font-size:16px">✏️ Edit Transaksi Lengkap</b><br>
<span style="font-size:12px;color:#64748b">Semua lini bisa diedit: tanggal, jenis, tempat, catatan, nama barang, jumlah/masuk-retur.</span><br><br>

<label style="font-size:12px;font-weight:700;color:#334155">Tanggal & Jam</label>
<input type="datetime-local" id="tglEdit-${key}" value="${local}" 
style="width:100%;padding:9px;border:1px solid #cbd5e1;border-radius:9px;margin:4px 0 10px"><br>

<label style="font-size:12px;font-weight:700;color:#334155">Jenis</label>
<select id="jenisEdit-${key}" style="width:100%;padding:9px;border:1px solid #cbd5e1;border-radius:9px;margin:4px 0 10px">
  <option value="Masuk" ${jenis.toLowerCase().includes("masuk") ? "selected" : ""}>Masuk</option>
  <option value="Sisa" ${jenis.toLowerCase().includes("sisa") ? "selected" : ""}>Sisa / Retur</option>
</select>

<label style="font-size:12px;font-weight:700;color:#334155">Tempat</label>
<select id="tempatEdit-${key}" style="width:100%;padding:9px;border:1px solid #cbd5e1;border-radius:9px;margin:4px 0 10px">
  <option value="Ikhwan" ${tempat.toLowerCase().includes("ikhwan") ? "selected" : ""}>Ikhwan</option>
  <option value="Akhwat" ${tempat.toLowerCase().includes("akhwat") ? "selected" : ""}>Akhwat</option>
</select>

<label style="font-size:12px;font-weight:700;color:#334155">Catatan</label>
<textarea id="catatanEdit-${key}" rows="2" style="width:100%;padding:9px;border:1px solid #cbd5e1;border-radius:9px;margin:4px 0 12px">${catatan}</textarea>

<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
  <b style="color:#1e3a8a">Daftar Item</b>
  <button onclick="tambahBarisEdit('${key}','${mode}')" style="border:none;border-radius:8px;background:#0f766e;color:white;padding:7px 10px;font-weight:700">+ Item</button>
</div>

<div id="editItems-${key}">${itemsHTML}</div>

<button onclick="simpanEdit('${key}','${mode}')" style="
margin-top:12px;
width:100%;
padding:11px;
background:#1e3a8a;
color:white;
border:none;
border-radius:10px;
font-weight:800;
">
💾 Simpan Perubahan
</button>

<button onclick="lihatRiwayat('${key}')" style="
margin-top:7px;
width:100%;
padding:9px;
background:#64748b;
color:white;
border:none;
border-radius:8px;
font-size:12px;
font-weight:700;
">
📜 Riwayat Edit
</button>

<div id="history-${key}" style="display:none;font-size:12px;margin-top:8px"></div>

</div>
`;

box.style.display="block";

});
}

function rowItemHTML(key, idx, i={}, mode="jumlah"){
  let barang = escText(i.barang || "");
  let jumlah = Number(i.jumlah || 0);
  let masuk = Number(i.masuk || 0);
  let retur = Number(i.retur || 0);

  if(mode === "masukRetur"){
    return `
    <div class="edit-row-${key}" style="background:white;border:1px solid #e2e8f0;border-radius:10px;padding:8px;margin-bottom:8px">
      ${itemSelectHTML(barang)}
      <div style="display:flex;gap:6px;align-items:center">
        <input type="number" placeholder="Masuk" value="${masuk}" data-field="masuk" style="flex:1;padding:8px;border:1px solid #cbd5e1;border-radius:8px">
        <input type="number" placeholder="Retur" value="${retur}" data-field="retur" style="flex:1;padding:8px;border:1px solid #cbd5e1;border-radius:8px">
        <button onclick="hapusBarisEdit(this)" style="border:none;border-radius:8px;background:#dc2626;color:white;padding:8px">🗑️</button>
      </div>
    </div>`;
  }

  return `
  <div class="edit-row-${key}" style="background:white;border:1px solid #e2e8f0;border-radius:10px;padding:8px;margin-bottom:8px">
    ${itemSelectHTML(barang)}
    <div style="display:flex;gap:6px;align-items:center">
      <input type="number" placeholder="Jumlah" value="${jumlah}" data-field="jumlah" style="flex:1;padding:8px;border:1px solid #cbd5e1;border-radius:8px">
      <button onclick="hapusBarisEdit(this)" style="border:none;border-radius:8px;background:#dc2626;color:white;padding:8px">🗑️</button>
    </div>
  </div>`;
}

function tambahBarisEdit(key, mode){
  let wrap = document.getElementById("editItems-"+key);
  wrap.insertAdjacentHTML("beforeend", rowItemHTML(key, Date.now(), {}, mode));
}

function hapusBarisEdit(btn){
  let row = btn.closest("div[class^='edit-row-']");
  if(row) row.remove();
}

// ================= SIMPAN + RIWAYAT =================
function simpanEdit(key, mode){

db.ref("jajan/"+key).once("value",snap=>{

let oldData = snap.val() || {};
let tglInput = document.getElementById("tglEdit-"+key).value;
let newDate = new Date(tglInput);

if(isNaN(newDate)){
  alert("Tanggal salah!");
  return;
}

let rows = [...document.querySelectorAll(`.edit-row-${key}`)];
let newItems = rows.map(row=>{
  let barang = row.querySelector('[data-field="barang"]').value.trim();

  if(mode === "masukRetur"){
    return {
      barang: barang,
      masuk: Number(row.querySelector('[data-field="masuk"]').value || 0),
      retur: Number(row.querySelector('[data-field="retur"]').value || 0)
    };
  }

  return {
    barang: barang,
    jumlah: Number(row.querySelector('[data-field="jumlah"]').value || 0)
  };
}).filter(i => i.barang !== "");

let masterNames = masterItemsEdit.map(x => x.nama.toLowerCase());
let adaItemKosong = rows.some(row => !row.querySelector('[data-field="barang"]').value.trim());
let adaItemTidakValid = newItems.some(i => !masterNames.includes(i.barang.toLowerCase()));

if(adaItemKosong){
  alert("Ada item yang belum dipilih. Pilih dari dropdown item dulu.");
  return;
}

if(adaItemTidakValid){
  alert("Ada item yang tidak sesuai master items. Pilih ulang dari dropdown.");
  return;
}

let newData = {
  waktu: newDate.toISOString(),
  jenis: document.getElementById("jenisEdit-"+key).value,
  tempat: document.getElementById("tempatEdit-"+key).value,
  catatan: document.getElementById("catatanEdit-"+key).value.trim(),
  items: newItems
};

let historyData = {
  waktuEdit: new Date().toISOString(),
  sebelum: {
    waktu: oldData.waktu || "",
    jenis: oldData.jenis || "",
    tempat: oldData.tempat || "",
    catatan: oldData.catatan || "",
    items: oldData.items || []
  },
  sesudah: newData
};

// simpan riwayat dulu, lalu update transaksi utama
db.ref("jajan/"+key+"/riwayatEdit").push(historyData).then(()=>{
  return db.ref("jajan/"+key).update(newData);
}).then(()=>{
  alert("Berhasil diupdate");
  loadLaporan();
  loadRekap();
  loadRekapBulanan();
});

});
}

// ================= LIHAT RIWAYAT =================
function lihatRiwayat(key){

let box = document.getElementById("history-"+key);

if(box.style.display==="block"){
  box.style.display="none";
  return;
}

db.ref("jajan/"+key+"/riwayatEdit").once("value",snap=>{

if(!snap.exists()){
  box.innerHTML = "Belum ada riwayat";
  box.style.display="block";
  return;
}

let html = "";

snap.forEach(c=>{
let d = c.val() || {};
let sebelum = d.sebelum || {};
let sesudah = d.sesudah || {};

html += `
<div style="border-top:1px solid #cbd5e1;padding-top:7px;margin-top:7px;line-height:1.5">
<b>${new Date(d.waktuEdit).toLocaleString("id-ID")}</b><br>
Dari: ${escText(sebelum.jenis)} - ${escText(sebelum.tempat)}<br>
Ke: ${escText(sesudah.jenis)} - ${escText(sesudah.tempat)}<br>
Item lama: ${(sebelum.items || []).map(i=>escText(i.barang)+"="+(i.jumlah ?? `M${i.masuk||0}/R${i.retur||0}`)).join(", ")}<br>
Item baru: ${(sesudah.items || []).map(i=>escText(i.barang)+"="+(i.jumlah ?? `M${i.masuk||0}/R${i.retur||0}`)).join(", ")}
</div>
`;
});

box.innerHTML = html;
box.style.display="block";

});
}

</script>

</body>
</html>
