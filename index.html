<!DOCTYPE html>
<html>
<head>
<title>Input Jajan</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
font-family:'Segoe UI',Arial;
margin:0;
background:linear-gradient(135deg,#0f172a,#1e3a8a);
}
.container{
max-width:420px;
margin:auto;
padding:10px;
}
.card{
background:white;
border-radius:16px;
padding:15px;
box-shadow:0 8px 20px rgba(0,0,0,0.2);
}
h2{text-align:center;color:#1e3a8a;}
label{font-weight:700;font-size:13px;margin-top:8px;display:block;}
select,input[type="number"]{
width:100%;padding:10px;border-radius:10px;border:1px solid #cbd5f5;margin-bottom:10px;font-weight:600;
}
.row{
display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #eee;padding:8px 0;
}
button{
width:100%;padding:14px;border:none;border-radius:12px;background:#1e3a8a;color:white;font-weight:700;margin-top:10px;
}
.radio-box{
background:#f1f5f9;
padding:10px;
border-radius:10px;
margin-bottom:10px;
}
</style>
</head>

<body>

<div class="container">
<div class="card">

<h2>Input Jajan</h2>

<label>Jenis</label>
<select id="jenis">
<option value="Masuk">Masuk</option>
<option value="Sisa">Sisa</option>
</select>

<label>Tempat</label>
<select id="tempat">
<option>Ikhwan</option>
<option>Akhwat</option>
</select>

<div id="dynamicItems"></div>

<div class="row">
<select id="slot1"></select>
<input type="number" id="slot1_jumlah">
</div>

<div class="row">
<select id="slot2"></select>
<input type="number" id="slot2_jumlah">
</div>

<!-- 🔥 PILIH NOMOR -->
<div class="radio-box">
<b>Pilih Nomor WA</b>
<div id="listWA"></div>
</div>

<button onclick="kirim()">💾 Simpan & Kirim WA</button>

</div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
firebase.initializeApp({
databaseURL:"https://maqshof-d5772-default-rtdb.asia-southeast1.firebasedatabase.app"
});
const db=firebase.database();

// FORMAT TANGGAL
function formatTanggal(){
let hari=["Minggu","Senin","Selasa","Rabu","Kamis","Jumat","Sabtu"];
let bulan=["Januari","Februari","Maret","April","Mei","Juni","Juli","Agustus","September","Oktober","November","Desember"];
let d=new Date();
return `${hari[d.getDay()]}, ${d.getDate()} ${bulan[d.getMonth()]}`;
}

// LOAD ITEM
function loadItems(){
let c=document.getElementById("dynamicItems");
c.innerHTML="";
db.ref("items").once("value",snap=>{
snap.forEach(x=>{
let nama=x.val().nama||x.val();
c.innerHTML+=`
<div class="row">
<span>${nama}</span>
<input type="number" data-nama="${nama}">
</div>`;
});
});
}

// DROPDOWN
function loadDropdown(){
let s1=document.getElementById("slot1");
let s2=document.getElementById("slot2");
s1.innerHTML='<option value="">-- Pilih --</option>';
s2.innerHTML='<option value="">-- Pilih --</option>';

db.ref("items").once("value",snap=>{
snap.forEach(x=>{
let nama=x.val().nama||x.val();
let opt=`<option value="${nama}">${nama}</option>`;
s1.innerHTML+=opt;
s2.innerHTML+=opt;
});
});
}

// LOAD NOMOR WA
function loadWA(){
let box=document.getElementById("listWA");

db.ref("config/wa").once("value",snap=>{
let wa=snap.val()||{};
box.innerHTML="";

["wa1","wa2","wa3","wa4"].forEach((k,i)=>{
if(wa[k]){
box.innerHTML+=`
<label>
<input type="radio" name="wa" value="${wa[k]}">
${wa[k]}
</label><br>`;
}
});
});
}

// SIMPAN + KIRIM
async function kirim(){

let items=[];

document.querySelectorAll("#dynamicItems input").forEach(i=>{
if(i.value){
items.push({barang:i.dataset.nama,jumlah:Number(i.value)});
}
});

function addSlot(a,b){
let barang=document.getElementById(a).value;
let jumlah=document.getElementById(b).value;
if(barang && jumlah){
items.push({barang:barang,jumlah:Number(jumlah)});
}
}
addSlot("slot1","slot1_jumlah");
addSlot("slot2","slot2_jumlah");

// 🔥 SIMPAN KE FIREBASE
let data={
waktu:new Date().toISOString(),
tempat:document.getElementById("tempat").value,
jenis:document.getElementById("jenis").value,
items:items
};

await db.ref("jajan").push(data);

// 🔥 FORMAT WA
let teks=formatTanggal()+"\n";
teks+=`${data.jenis} - ${data.tempat}\n\n`;

items.forEach(i=>{
teks+=`${i.barang} ${i.jumlah}\n`;
});

// 🔥 AMBIL NOMOR TERPILIH
let pilih=document.querySelector('input[name="wa"]:checked');

if(!pilih){
alert("Pilih nomor WA dulu");
return;
}

let url=`https://wa.me/${pilih.value}?text=${encodeURIComponent(teks)}`;
window.open(url,"_blank");

alert("Berhasil disimpan & dikirim");
location.reload();
}

// INIT
window.onload=function(){
loadItems();
loadDropdown();
loadWA();
}
</script>

</body>
</html>
